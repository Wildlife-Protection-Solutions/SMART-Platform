65\u0580\u0568 Connect-\u0578\u0582\u0574 \u0587 \u057d\u057f\u0565\u0572\u056e\u0565\u056c/\u0569\u0561\u0580\u0574\u0561\u0581\u0576\u0565\u056c Connect-\u056b \u056e\u0561\u0576\u0578\u0582\u0581\u0578\u0582\u0574\u0576\u0565\u0580\u0568\: \u0534\u0578\u0582\u0584 \u056f\u0561\u0580\u0578\u0572 \u0565\u0584 \u0579\u0565\u0572\u0561\u0580\u056f\u0565\u056c \u0574\u0578\u0582\u057f\u0584\u0568\u055d \u0566\u0580\u0578\u0575\u0561\u0581\u0576\u0565\u056c\u0578\u057e \u0562\u0561\u0576\u0561\u056c\u056b\u0576\: \u0532\u0561\u0576\u0561\u056c\u056b\u0576 \u057e\u0565\u0580\u0561\u056f\u0561\u0575\u0565\u056c\u0568 \u056f\u0570\u0561\u0576\u0563\u0565\u0581\u0576\u056b \u0576\u0580\u0561\u0576, \u0578\u0580 \u0562\u0578\u056c\u0578\u0580 \u0561\u057c\u056f\u0561 SMART Mobile \u057d\u0561\u0580\u0584\u0565\u0580\u0576 \u0561\u0575\u056c\u0587\u057d \u0579\u0565\u0576 \u056f\u0561\u0580\u0578\u0572\u0561\u0576\u0561 \u0577\u0583\u057e\u0565\u056c SMART Connect-\u056b \u0570\u0565\u057f\: \u0531\u0575\u057d \u0586\u0578\u0582\u0576\u056f\u0581\u056b\u0578\u0576\u0561\u056c\u0578\u0582\u0569\u0575\u0578\u0582\u0576\u0568 \u057e\u0565\u0580\u0561\u056f\u0561\u0576\u0563\u0576\u0565\u056c\u0578\u0582 \u0570\u0561\u0574\u0561\u0580 \u0561\u0566\u0564\u0561\u056f\u056b\u0580 \u054a\u0561\u0570\u057a\u0561\u0576\u0574\u0561\u0576 \u054f\u0561\u0580\u0561\u056e\u0584\u056b \u0562\u0578\u056c\u0578\u0580 \u0583\u0561\u0569\u0565\u0569\u0576\u0565\u0580\u0568 \u057a\u0565\u057f\u0584 \u0567 \u0570\u0565\u057c\u0561\u0581\u057e\u0565\u0576, \u057e\u0565\u0580\u057d\u057f\u0565\u0572\u056e\u057e\u0565\u0576, \u0561\u0575\u0576\u0578\u0582\u0570\u0565\u057f\u0587 \u0576\u0578\u0580\u056b\u0581 \u0561\u0580\u057f\u0561\u0570\u0561\u0576\u057e\u0565\u0576 \u057d\u0561\u0580\u0584\u0565\u0580\: \u0544\u056b\u0561\u0575\u0576 SMART Connect-\u056b \u0561\u0564\u0574\u056b\u0576\u056b\u057d\u057f\u0580\u0561\u057f\u0578\u0580\u0576\u0565\u0580\u0568 \u0587 \u054a\u0561\u0570\u057a\u0561\u0576\u0574\u0561\u0576 \u057f\u0561\u0580\u0561\u056e\u0584\u056b \u0561\u0564\u0574\u056b\u0576\u056b\u057d\u057f\u0580\u0561\u057f\u0578\u0580\u0576\u0565\u0580\u0568 \u056f\u0561\u0580\u0578\u0572 \u0565\u0576 \u057e\u0565\u0580\u0561\u056f\u0561\u0575\u0565\u056c API-\u056b \u0562\u0561\u0576\u0561\u056c\u056b\u0568\:<br>\u0544\u0561\u057d\u0576\u0561\u057e\u0578\u0580 \u0562\u0561\u0576\u0561\u056c\u056b\u0576\u0565\u0580 \u0585\u0563\u057f\u0561\u0563\u0578\u0580\u056e\u057e\u0578\u0582\u0574 \u0565\u0576 Patrol \u0587 Survey \u0583\u0561\u0569\u0565\u0569\u0576\u0565\u0580\u056b \u0570\u0561\u0574\u0561\u0580, \u0578\u0580\u0578\u0576\u0584 \u0576\u0565\u0580\u0562\u0565\u057c\u0576\u0574\u0561\u0576 \u0570\u0561\u0574\u0561\u0580 \u0569\u0578\u0582\u0575\u056c\u057f\u057e\u0578\u0582\u0569\u0575\u0578\u0582\u0576 \u0565\u0576 \u057a\u0561\u0570\u0561\u0576\u057b\u0578\u0582\u0574\: SMART Collect \u057d\u057f\u0565\u0572\u0576\u0565\u0580\u0568 \u0585\u0563\u057f\u0561\u0563\u0578\u0580\u056e\u057e\u0578\u0582\u0574 \u0565\u0576 SMART Collect \u0583\u0561\u0569\u0565\u0569\u0576\u0565\u0580\u056b \u056f\u0578\u0572\u0574\u056b\u0581, \u0578\u0580\u0578\u0576\u0584 \u0570\u0561\u057d\u0561\u0576\u0565\u056c\u056b \u0565\u0576 \u056c\u0561\u0575\u0576 \u0570\u0561\u0576\u0580\u0578\u0582\u0569\u0575\u0561\u0576\u0568\:
