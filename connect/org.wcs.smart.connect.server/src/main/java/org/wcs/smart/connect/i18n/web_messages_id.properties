users.desktopmessage=Anda dapat membuat dan mengedit pengguna Desktop di KK yang diunggah ke server ini. Pengguna ini terpisah dan berbeda dari nama pengguna dan izin Connect. Perubahan yang dibuat di halaman ini akan memengaruhi pengguna Desktop yang mencoba menyinkronkan atau menghubungi server Connect ini, dan begitu Desktop tertentu telah menyinkronkan perubahan yang dibuat, login di masa mendatang pada mesin lokal tersebut akan terpengaruh oleh perubahan yang dibuat di sini juga. Anda juga dapat mengedit pengguna di semua KK, pastikan Anda memahami KK mana yang akan terpengaruh sebelum memilih opsi ini. Anda dapat melihat KK mana yang ada di server Connect ini dengan mengklik item menu 'Kawasan Konservasi'.<br><br>Hanya akun pengguna SMART desktop aktif yang ditampilkan di sini. Untuk mengaktifkan kembali akun yang dinonaktifkan, Anda harus menggunakan perangkat lunak SMART Desktop.
