cybertracker.apikeys=Kunci API SMART Mobile
cybertracker.apikeysmessage1= Kunci API SMART Mobile disertakan dalam paket SMART Mobile dan memungkinkan SMART Mobile untuk berkomunikasi dengan SMART Connect. Setiap Kawasan Konservasi memiliki kunci sendiri yang membatasi akses ke paket yang terkait dengan Kawasan Konservasi tersebut. Kunci ini harus dijaga kerahasiaannya. Pengguna yang memiliki akses ke kunci ini dapat mengunduh paket SMART Mobile dari Connect, melihat isi paket, mengunggah data penemuan ke Connect, dan membuat/memperbarui perintah Connect. Anda dapat mencabut akses dengan mengatur ulang kunci. Mengatur ulang kunci akan menyebabkan semua perangkat SMART Mobile yang ada tidak dapat lagi berkomunikasi dengan SMART Connect. Untuk memulihkan fungsi ini, semua paket untuk Kawasan Konservasi yang terkena dampak harus dihapus, dibuat ulang, lalu diekspor ulang ke perangkat. Hanya Administrator SMART Connect dan Administrator Kawasan Konservasi yang dapat mengatur ulang Kunci API.<br>Kunci pribadi digunakan untuk Paket Patroli dan Survei yang memerlukan otorisasi untuk diunduh. Kunci SMART Collect digunakan oleh paket SMART Collect yang tersedia untuk umum.  
