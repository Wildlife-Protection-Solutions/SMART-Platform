cybertracker.apikeysmessage1= As chaves API DO SMART Mobile est\u00e3o inclu\u00eddas nos pacotes DO SMART Mobile e permitem QUE O SMART Mobile se comunique com O SMART Connect. Cada \u00c1rea de Conserva\u00e7\u00e3o tem sua pr\u00f3pria chave que limita o acesso aos pacotes associados a essa \u00c1rea de Conserva\u00e7\u00e3o.  Estas chaves devem ser mantidas secretas. Os utilizadores com acesso a esta chave podem transferir pacotes DO SMART Mobile a partir do Connect, ver o conte\u00fado do pacote, carregar dados de visualiza\u00e7\u00e3o para Connect e criar/atualizar alertas Connect.  Pode revogar o acesso redefinindo a chave.  A reposi\u00e7\u00e3o da chave far\u00e1 com que todos os dispositivos SMART Mobile existentes deixem de poder comunicar com O SMART Connect.  Para restaurar essa funcionalidade, todos os pacotes da \u00c1rea de Conserva\u00e7\u00e3o Afetada precisar\u00e3o ser removidos, recriados e reexportados para os dispositivos. Apenas os Administradores DO SMART Connect e os Administradores da \u00c1rea de Conserva\u00e7\u00e3o podem redefinir a Chave API.<br>Chaves particulares s\u00e3o usadas para pacotes Patrol e Survey que requerem autoriza\u00e7\u00e3o para download.  As chaves SMART Collect s\u00e3o utilizadas pelos pacotes SMART Collect dispon\u00edveis para o p\u00fablico em geral.  
