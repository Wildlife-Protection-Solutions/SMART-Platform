users.desktopmessage=Voc\u00ea pode criar e editar os usu\u00e1rios do Desktop nas CAs que s\u00e3o carregadas para este servidor. Esses usu\u00e1rios s\u00e3o separados e distintos dos nomes de usu\u00e1rio e permiss\u00f5es do Connect. As altera\u00e7\u00f5es efetuadas nesta p\u00e1gina ir\u00e3o afetar os utilizadores do ambiente de trabalho que tentam sincronizar ou contactar este servidor Connect e, assim que um determinado Ambiente de trabalho tiver sincronizado as altera\u00e7\u00f5es efetuadas, os futuros in\u00edcios de sess\u00e3o nessa m\u00e1quina local tamb\u00e9m ser\u00e3o afetados por quaisquer altera\u00e7\u00f5es efetuadas aqui. Voc\u00ea tamb\u00e9m pode editar usu\u00e1rios em todas as CAs. Certifique-se de entender quais CAs ser\u00e3o afetadas antes de selecionar esta op\u00e7\u00e3o. Voc\u00ea pode exibir quais CAs est\u00e3o neste servidor Connect clicando no item de menu '\u00c1reas de conserva\u00e7\u00e3o'.<br><br>Apenas as contas de utilizador ativas DO SMART Desktop s\u00e3o apresentadas aqui.  Para reativar uma conta desativada, voc\u00ea deve usar o software SMART Desktop.
