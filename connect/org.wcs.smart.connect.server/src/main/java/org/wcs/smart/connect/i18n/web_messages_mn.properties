6\u044b\u0433 \u0442\u0430\u0442\u0430\u0445, \u0430\u0433\u0443\u0443\u043b\u0433\u044b\u0433 \u04af\u0437\u044d\u0445, \u0430\u0436\u0438\u0433\u043b\u0430\u043b\u0442\u044b\u043d \u04e9\u0433\u04e9\u0433\u0434\u043b\u0438\u0439\u0433 \u0421\u041c\u0410\u0420\u0422 \u0425\u043e\u043b\u0431\u043e\u043e\u0441 \u0440\u0443\u0443 \u0431\u0430\u0439\u0440\u043b\u0443\u0443\u043b\u0430\u0445, \u0421\u041c\u0410\u0420\u0422 \u0425\u043e\u043b\u0431\u043e\u043e\u0441 \u0430\u043d\u0445\u0430\u0430\u0440\u0443\u0443\u043b\u0433\u0430 \u04af\u04af\u0441\u0433\u044d\u0445/\u0448\u0438\u043d\u044d\u0447\u043b\u044d\u0445 \u0431\u043e\u043b\u043e\u043c\u0436\u0442\u043e\u0439. \u0422\u0430 \u0442\u04af\u043b\u0445\u04af\u04af\u0440\u0438\u0439\u0433 \u0434\u0430\u0445\u0438\u043d \u0442\u043e\u0445\u0438\u0440\u0443\u0443\u043b\u0430\u0445 \u0437\u0430\u043c\u0430\u0430\u0440 \u0445\u0430\u043d\u0434\u0430\u043b\u0442\u044b\u0433 \u0446\u0443\u0446\u0430\u043b\u0436 \u0431\u043e\u043b\u043d\u043e. \u0422\u04af\u043b\u0445\u04af\u04af\u0440\u0438\u0439\u0433 \u0434\u0430\u0445\u0438\u043d \u0442\u043e\u0445\u0438\u0440\u0443\u0443\u043b\u0441\u043d\u0430\u0430\u0440 \u0431\u04af\u0445 \u043e\u0434\u043e\u043e \u0431\u0430\u0439\u0433\u0430\u0430 \u0421\u041c\u0410\u0420\u0422 Mobile \u0442\u04e9\u0445\u04e9\u04e9\u0440\u04e9\u043c\u0436\u04af\u04af\u0434 \u0421\u041c\u0410\u0420\u0422 \u0425\u043e\u043b\u0431\u043e\u043e\u0441-\u0442\u043e\u0439 \u0445\u0430\u0440\u0438\u043b\u0446\u0430\u0445 \u0431\u043e\u043b\u043e\u043c\u0436\u0433\u04af\u0439 \u0431\u043e\u043b\u043d\u043e. \u042d\u043d\u044d \u04af\u0439\u043b\u0434\u043b\u0438\u0439\u0433 \u0441\u044d\u0440\u0433\u044d\u044d\u0445\u0438\u0439\u043d \u0442\u0443\u043b\u0434 \u0442\u0443\u0445\u0430\u0439\u043d \u0445\u0430\u043c\u0433\u0430\u0430\u043b\u0430\u043b\u0442\u0442\u0430\u0439 \u0433\u0430\u0437\u0430\u0440 \u043d\u0443\u0442\u0433\u0438\u0439\u043d \u0431\u04af\u0445 \u0431\u0430\u0433\u0446\u044b\u0433 \u0443