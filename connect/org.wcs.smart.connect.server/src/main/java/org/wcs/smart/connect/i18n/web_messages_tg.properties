users.desktopmessage="\u0428\u0443\u043C\u043E \u043C\u0435\u0442\u0430\u0432\u043E\u043D\u0435\u0434 \u043A\u043E\u0440\u0431\u0430\u0440\u043E\u043D\u0438 \u041C\u0438\u0437\u0438 \u043A\u043E\u0440\u0438\u0440\u043E \u0434\u0430\u0440  CA-\u04B3\u043E\u0435, \u043A\u0438 \u0431\u0430 \u0438\u043D \u0441\u0435\u0440\u0432\u0435\u0440 \u0431\u043E\u0440\u0433\u0443\u0437\u043E\u0440\u04E3 \u043A\u0430\u0440\u0434\u0430 \u043C\u0435\u0448\u0430\u0432\u0430\u043D\u0434, \u044D\u04B7\u043E\u0434 \u0432\u0430 \u0442\u0430\u04B3\u0440\u0438\u0440 \u043A\u0443\u043D\u0435\u0434. \u0418\u043D \u043A\u043E\u0440\u0431\u0430\u0440\u043E\u043D \u0430\u0437 \u043D\u043E\u043C\u0438 \u043A\u043E\u0440\u0431\u0430\u0440\u043E\u043D \u0432\u0430 \u0438\u04B7\u043E\u0437\u0430\u0442\u04B3\u043E\u0438 Connect \u04B7\u0443\u0434\u043E\u044F\u043D\u0434 \u0432\u0430 \u0444\u0430\u0440\u049B \u043C\u0435\u043A\u0443\u043D\u0430\u043D\u0434. \u0422\u0430\u0493\u0439\u0438\u0440\u043E\u0442\u0435, \u043A\u0438 \u0434\u0430\u0440 \u0438\u043D \u0441\u0430\u04B3\u0438\u0444\u0430 \u0432\u043E\u0440\u0438\u0434 \u043A\u0430\u0440\u0434\u0430 \u0448\u0443\u0434\u0430\u0430\u043D\u0434, \u0431\u0430 \u043A\u043E\u0440\u0431\u0430\u0440\u043E\u043D\u0438 \u043C\u0438\u0437\u0438 \u043A\u043E\u0440\u04E3, \u043A\u0438 \u043A\u04EF\u0448\u0438\u0448\u0438 \u04B3\u0430\u043C\u043E\u04B3\u0430\u043D\u0433\u0441\u043E\u0437\u04E3 \u0451 \u0442\u0430\u043C\u043E\u0441 \u0431\u043E \u0438\u043D \u0441\u0435\u0440\u0432\u0435\u0440\u0438 Connect - \u0440\u043E \u0434\u043E\u0440\u0430\u043D\u0434, \u0442\u0430\u044A\u0441\u0438\u0440 \u043C\u0435\u0440\u0430\u0441\u043E\u043D\u0430\u0434 \u0432\u0430 \u0432\u0430\u049B\u0442\u0435 \u043A\u0438 \u041C\u0438\u0437\u0438 \u043A\u043E\u0440\u0438\u0438 \u043C\u0443\u0448\u0430\u0445\u0445\u0430\u0441 \u0442\u0430\u0493\u0438\u0440\u043E\u0442\u04B3\u043E\u0438 \u0432\u043E\u0440\u0438\u0434\u0448\u0443\u0434\u0430\u0440\u043E \u04B3\u0430\u043C\u043E\u04B3\u0430\u043D\u0433 \u043A\u0430\u0440\u0434\u0430\u0430\u0441\u0442, \u0432\u043E\u0440\u0438\u0434\u043E\u0442\u0438 \u043E\u044F\u043D\u0434\u0430 \u0434\u0430\u0440 \u043E\u043D \u0441\u0435\u0440\u0432\u0435\u0440\u0438 \u043C\u0430\u04B3\u0430\u043B\u043B\u04E3 \u0431\u0430 \u04B3\u0430\u043C\u0430 \u0433\u0443\u043D\u0430 \u0442\u0430\u0493\u0438\u0440\u043E\u0442 \u0434\u0430\u0440 \u0438\u043D \u04B7\u043E \u043D\u0438\u0437 \u0442\u0430\u044A\u0441\u0438\u0440 \u0445\u043E\u04B3\u0430\u0434 \u043A\u0430\u0440\u0434. \u0428\u0443\u043C\u043E \u0438\u043D\u0447\u0443\u043D\u0438\u043D \u043C\u0435\u0442\u0430\u0432\u043E\u043D\u0435\u0434 \u043A\u043E\u0440\u0431\u0430\u0440\u043E\u043D\u0440\u043E \u0434\u0430\u0440 \u0442\u0430\u043C\u043E\u043C\u0438 \u041C\u0438\u043D\u0442\u0430\u049B\u0430\u04B3\u043E\u0438 \u043C\u0443\u04B3\u043E\u0444\u0438\u0437\u0430\u0442\u04E3 \u0442\u0430\u04B3\u0440\u0438\u0440 \u043A\u0443\u043D\u0435\u0434, \u043F\u0435\u0448 \u0430\u0437 \u0438\u043D\u0442\u0438\u0445\u043E\u0431 \u0431\u043E\u0432\u0430\u0440\u04E3 \u04B3\u043E\u0441\u0438\u043B \u043A\u0443\u043D\u0435\u0434, \u043A\u0438 \u0438\u043D\u0442\u0438\u0445\u043E\u0431\u0438 \u0438\u043D \u0445\u043E\u0441\u0438\u044F\u0442 \u0431\u0430 \u043A\u0430\u0434\u043E\u043C \u041C\u04B2 \u0442\u0430\u044A\u0441\u0438\u0440 \u0445\u043E\u04B3\u0430\u0434 \u043A\u0430\u0440\u0434. \u0428\u0443\u043C\u043E \u043C\u0435\u0442\u0430\u0432\u043E\u043D\u0435\u0434 \u0431\u043E \u043F\u0430\u0445\u0448\u0438 \u0431\u0430\u043D\u0434\u0438 \u043C\u0435\u043D\u044E\u0438 ""\u041C\u0438\u043D\u0442\u0430\u049B\u0430\u04B3\u043E\u0438 \u043C\u0443\u04B3\u043E\u0444\u0438\u0437\u0430\u0442\u04E3"" \u0434\u0438\u0434\u0430\u043D \u043A\u0443\u043D\u0435\u0434, \u043A\u0438 \u043A\u0430\u0434\u043E\u043C \u041C\u04B2 \u0434\u0430\u0440 \u0438\u043D \u0441\u0435\u0440\u0432\u0435\u0440\u0438 Connect \u04B3\u0430\u0441\u0442\u0430\u043D\u0434." 
