cybertracker.apikeysmessage1=Las claves API de SMART Mobile se incluyen en los paquetes de SMART Mobile y permiten que SMART Mobile se comunique con SMART Connect. Cada \u00c1rea de Conservaci\u00f3n tiene su propia clave que limita el acceso a los paquetes asociados. Estas claves deben mantenerse en secreto. Los usuarios con acceso a esta clave pueden descargar paquetes de SMART Mobile desde Connect, ver su contenido, cargar datos de avistamientos a Connect y crear/actualizar alertas de Connect. Puede revocar el acceso restableciendo la clave. Al restablecer la clave, todos los dispositivos SMART Mobile existentes dejar\u00e1n de poder comunicarse con SMART Connect. Para restablecer esta funcionalidad, ser\u00e1 necesario eliminar, volver a crear y volver a exportar a los dispositivos todos los paquetes del \u00c1rea de Conservaci\u00f3n afectada. Solo los administradores de SMART Connect y del \u00c1rea de Conservaci\u00f3n pueden restablecer la clave API.<br>Las claves privadas se utilizan para los paquetes de Patrulla y Estudio que requieren autorizaci\u00f3n para su descarga. Las claves de SMART Collect se utilizan para los paquetes de SMART Collect disponibles para el p\u00fablico general.
