users.desktopmessage=You can create and edit the Desktop users in CAs that are upload to this server. These users are separate and distinct from Connect usernames and permissions. The changes made on this page will affect desktop users trying to sync or contact this Connect server, and once a particular Desktop has sync'd the changes made, future logins on that local machine will be affect by any changes made here as well. You can also edit users across all CAs, be sure you understand which CAs you will be affected before selectig this option. You can view which CAs are on this Connect server by clicking the 'Conservation Areas' menu item.<br><br>Only active SMART desktop user accounts are shown here.  To re-enable a disabled account you must use the SMART Desktop software.
