cybertracker.apikeys=SMART Mobile API Keys
cybertracker.apikeysmessage1= SMART Mobile API keys are included in SMART Mobile packages and allow SMART Mobile to communicate with SMART Connect. Each Conservation Area has its own key that limits access to the packages associated with that Conservation Area.  These keys should be kept secret. Users with access to this key are able to download SMART Mobile packages from Connect, view the package contents, upload sighting data to Connect, and create/update Connect alerts.  You can revoke access by resetting the key.  Resetting the key will cause all existing SMART Mobile devices to no longer be able to communicate with SMART Connect.  To restore this functionality all packages for the affect Conservation Area will need to be removed, recreated, then re-exported to the devices. Only SMART Connect Administrators and Conservation Area Administrators can reset the API Key.<br>Private keys are used for Patrol and Survey packages that require authorization to download.  SMART Collect keys are used by the SMART Collect packages that are available to the general public.  
