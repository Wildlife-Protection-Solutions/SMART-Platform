users.desktopmessage=Vous pouvez cr\u00e9er et modifier les utilisateurs de bureau dans les AC qui sont t\u00e9l\u00e9charg\u00e9s sur ce serveur. Ces utilisateurs sont s\u00e9par\u00e9s et distincts des noms d'utilisateur et des permissions de Connect. Les modifications apport\u00e9es sur cette page affecteront les utilisateurs de bureau qui tentent de se synchroniser ou de contacter ce serveur Connect, et une fois qu'un bureau particulier a synchronis\u00e9 les modifications apport\u00e9es, les futures connexions sur cette machine locale seront \u00e9galement affect\u00e9es par toute modification apport\u00e9e ici. Vous pouvez \u00e9galement modifier les utilisateurs de toutes les AC, assurez-vous de bien comprendre quelles AC seront affect\u00e9es avant de s\u00e9lectionner cette option. Vous pouvez voir quelles AC se trouvent sur ce serveur Connect en cliquant sur l'\u00e9l\u00e9ment de menu 'Zones de conservation'.<br><br>Seuls les comptes d'utilisateurs SMART desktop actifs sont affich\u00e9s ici. Pour r\u00e9activer un compte d\u00e9sactiv\u00e9, vous devez utiliser le logiciel SMART Desktop.
