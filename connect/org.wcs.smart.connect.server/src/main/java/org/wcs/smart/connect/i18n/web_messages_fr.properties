cybertracker.apikeysmessage1= Les cl\u00e9s API SMART Mobile sont incluses dans les packages SMART Mobile et permettent \u00e0 SMART Mobile de communiquer avec SMART Connect. Chaque aire de conservation a sa propre cl\u00e9 qui limite l'acc\u00e8s aux packages associ\u00e9s \u00e0 cette aire de conservation. Ces cl\u00e9s doivent rester secr\u00e8tes. Les utilisateurs ayant acc\u00e8s \u00e0 cette cl\u00e9 peuvent t\u00e9l\u00e9charger des packages SMART Mobile depuis Connect, voir le contenu des packages, uploader des donn\u00e9es d'observation vers Connect, et cr\u00e9er/mettre \u00e0 jour des alertes Connect. Vous pouvez r\u00e9voquer l'acc\u00e8s en r\u00e9initialisant la cl\u00e9. La r\u00e9initialisation de la cl\u00e9 entra\u00eenera l'incapacit\u00e9 de tous les appareils SMART Mobile existants \u00e0 communiquer avec SMART Connect. Pour restaurer cette fonctionnalit\u00e9, tous les packages pour l'aire de conservation affect\u00e9e devront \u00eatre supprim\u00e9s, recr\u00e9\u00e9s, puis r\u00e9export\u00e9s vers les appareils. Seuls les administrateurs SMART Connect et les administrateurs d'aire de conservation peuvent r\u00e9initialiser la cl\u00e9 API.<br>Les cl\u00e9s priv\u00e9es sont utilis\u00e9es pour les packages de Patrouille et d'Enqu\u00eate qui n\u00e9cessitent une autorisation pour \u00eatre t\u00e9l\u00e9charg\u00e9s. Les cl\u00e9s SMART Collect sont utilis\u00e9es par les packages SMART Collect qui sont disponibles au grand public.  
