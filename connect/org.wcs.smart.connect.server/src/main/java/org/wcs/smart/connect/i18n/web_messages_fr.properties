upgrade.upgradefailmsg1=Une erreur est survenue lors de la mise \u00e0 jour de SMART. \u00c0 ce stade, l'\u00e9tat de la base de donn\u00e9es et du magasin de fichiers est inconnu. Vous ne devriez pas continuer \u00e0 l'utiliser.
upgrade.upgradefailmsg2=V\u00e9rifiez les journaux d'erreurs. Vous devrez probablement r\u00e9soudre le probl\u00e8me, restaurer une sauvegarde et r\u00e9essayer.
upgrade.upgradeok=La mise \u00e0 jour de SMART Connect s'est termin\u00e9e normalement. Vous pouvez continuer \u00e0 utiliser SMART.
upgrade.uptodate=Ce serveur SMART Connect est d\u00e9j\u00e0 \u00e0 jour. Aucune action n'a \u00e9t\u00e9 effectu\u00e9e.
