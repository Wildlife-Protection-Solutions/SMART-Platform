sharedlinks.sourceip2=*optionnel, laisser vide pour autoriser toute IP
sharedlinks.title=Liens partag\u00e9s & Jetons
sharedlinks.tokenexplanation=Ce jeton agit comme un 'ID de session' et le fait de le passer dans votre requ\u00eate utilise les permissions de s\u00e9curit\u00e9 de l'utilisateur qui l'a cr\u00e9\u00e9, sans passer le mot de passe de l'utilisateur \u00e0 l'authentification BASIC. Par cons\u00e9quent, TRAITEZ CE JETON COMME UN MOT DE PASSE, et gardez-le en s\u00e9curit\u00e9.
sharedlinks.tokeninfo=Les jetons donnent acc\u00e8s \u00e0 plusieurs ressources de SMART Connect sans avoir besoin de se connecter avec un nom d'utilisateur et un mot de passe. Les permissions associ\u00e9es \u00e0 un jeton sont les m\u00eames que les permissions associ\u00e9es \u00e0 l'utilisateur actuel. Les jetons peuvent \u00eatre configur\u00e9s pour expirer ou \u00eatre limit\u00e9s \u00e0 une adresse IP. Ils sont fournis aux utilisateurs qui souhaitent acc\u00e9der \u00e0 l'API de SMART Connect.
sharedlinks.tokentitle=Jetons
sharedlinks.tokenwarning=Ce jeton agit comme un autre mot de passe pour votre compte. Traitez-le comme un mot de passe.
sharedlinks.url=Lien partag\u00e9 / Jeton
