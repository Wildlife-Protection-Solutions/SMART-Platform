sharedlinks.createnewdetails=Ces liens vous permettent de partager des donn\u00e9es avec des personnes qui n'ont pas de comptes SMART Connect. Toute personne disposant de l'URL du lien peut acc\u00e9der aux donn\u00e9es sp\u00e9cifiques qui ont \u00e9t\u00e9 partag\u00e9es. Vous pouvez supprimer les liens sur cette page pour supprimer l'acc\u00e8s aux donn\u00e9es associ\u00e9es. Les liens sont automatiquement supprim\u00e9s une fois expir\u00e9s.
sharedlinks.createnewdetails2=N'incluez aucune donn\u00e9e sensible dans un lien partag\u00e9. D\u00e9finissez toujours la dur\u00e9e d'expiration la plus courte possible pour vos besoins afin de garantir que les liens ne sont pas utilis\u00e9s au-del\u00e0 de l'objectif pr\u00e9vu.
sharedlinks.custom=Personnalis\u00e9...
sharedlinks.expiresat=Date d'expiration du lien
sharedlinks.link=Lien interne
sharedlinks.linkinfo=Les liens partag\u00e9s donnent acc\u00e8s \u00e0 des ressources sp\u00e9cifiques (requ\u00eates, rapports) \u00e0 toute personne (sans avoir besoin de se connecter). Les liens partag\u00e9s sont cr\u00e9\u00e9s \u00e0 partir de la page de la ressource associ\u00e9e (ex. Requ\u00eates ou Rapports).
