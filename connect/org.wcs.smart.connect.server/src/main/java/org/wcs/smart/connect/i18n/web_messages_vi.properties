users.desktopmessage=B\u1EA1n c\u00F3 th\u1EC3 t\u1EA1o v\u00E0 ch\u1EC9nh s\u1EEDa ng\u01B0\u1EDDi d\u00F9ng Desktop trong c\u00E1c Khu b\u1EA3o t\u1ED3n \u0111\u00E3 \u0111\u01B0\u1EE3c t\u1EA3i l\u00EAn m\u00E1y ch\u1EE7 n\u00E0y. Nh\u1EEFng ng\u01B0\u1EDDi d\u00F9ng n\u00E0y t\u00E1ch bi\u1EC7t v\u00E0 kh\u00E1c v\u1EDBi t\u00EAn ng\u01B0\u1EDDi d\u00F9ng v\u00E0 quy\u1EC1n truy c\u1EADp Connect. C\u00E1c thay \u0111\u1ED5i \u0111\u01B0\u1EE3c th\u1EF1c hi\u1EC7n tr\u00EAn trang n\u00E0y s\u1EBD \u1EA3nh h\u01B0\u1EDFng \u0111\u1EBFn ng\u01B0\u1EDDi d\u00F9ng desktop \u0111ang c\u1ED1 g\u1EAFng \u0111\u1ED3ng b\u1ED9 ho\u1EB7c li\u00EAn h\u1EC7 v\u1EDBi m\u00E1y ch\u1EE7 Connect n\u00E0y, v\u00E0 khi m\u1ED9t Desktop c\u1EE5 th\u1EC3 \u0111\u00E3 \u0111\u1ED3ng b\u1ED9 c\u00E1c thay \u0111\u1ED5i, vi\u1EC7c \u0111\u0103ng nh\u1EADp trong t\u01B0\u01A1ng lai tr\u00EAn m\u00E1y t\u00EDnh c\u1EE5c b\u1ED9 \u0111\u00F3 c\u0169ng s\u1EBD b\u1ECB \u1EA3nh h\u01B0\u1EDFng b\u1EDFi b\u1EA5t k\u1EF3 thay \u0111\u1ED5i n\u00E0o \u0111\u01B0\u1EE3c th\u1EF1c hi\u1EC7n t\u1EA1i \u0111\u00E2y. B\u1EA1n c\u00F3 th\u1EC3 ch\u1EC9nh s\u1EEDa ng\u01B0\u1EDDi d\u00F9ng tr\u00EAn t\u1EA5t c\u1EA3 c\u00E1c Khu b\u1EA3o t\u1ED3n, h\u00E3y \u0111\u1EA3m b\u1EA3o b\u1EA1n hi\u1EC3u r\u00F5 c\u00E1c Khu b\u1EA3o t\u1ED3n n\u00E0o s\u1EBD b\u1ECB \u1EA3nh h\u01B0\u1EDFng tr\u01B0\u1EDBc khi ch\u1ECDn t\u00F9y ch\u1ECDn n\u00E0y. B\u1EA1n c\u00F3 th\u1EC3 xem c\u00E1c Khu b\u1EA3o t\u1ED3n tr\u00EAn m\u00E1y ch\u1EE7 Connect n\u00E0y b\u1EB1ng c\u00E1ch nh\u1EA5p v\u00E0o m\u1EE5c menu 'Conservation Areas' (Khu b\u1EA3o t\u1ED3n).<br><br>Ch\u1EC9 c\u00E1c t\u00E0i kho\u1EA3n ng\u01B0\u1EDDi d\u00F9ng SMART desktop \u0111ang ho\u1EA1t \u0111\u1ED9ng m\u1EDBi \u0111\u01B0\u1EE3c hi\u1EC3n th\u1ECB t\u1EA1i \u0111\u00E2y. \u0110\u1EC3 k\u00EDch ho\u1EA1t l\u1EA1i m\u1ED9t t\u00E0i kho\u1EA3n \u0111\u00E3 b\u1ECB v\u00F4 hi\u1EC7u h\u00F3a, b\u1EA1n ph\u1EA3i s\u1EED d\u1EE5ng ph\u1EA7n m\u1EC1m SMART Desktop.
