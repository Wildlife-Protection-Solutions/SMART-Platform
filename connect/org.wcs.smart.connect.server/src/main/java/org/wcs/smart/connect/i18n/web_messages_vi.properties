cybertracker.apikeys=Kh\u00F3a API SMART Mobile
cybertracker.apikeysmessage1=Kh\u00F3a API SMART Mobile \u0111\u01B0\u1EE3c bao g\u1ED3m trong c\u00E1c g\u00F3i SMART Mobile v\u00E0 cho ph\u00E9p SMART Mobile giao ti\u1EBFp v\u1EDBi SMART Connect. M\u1ED7i Khu b\u1EA3o t\u1ED3n c\u00F3 m\u1ED9t kh\u00F3a ri\u00EAng gi\u1EDBi h\u1EA1n quy\u1EC1n truy c\u1EADp \u0111\u1ED1i v\u1EDBi c\u00E1c g\u00F3i li\u00EAn quan \u0111\u1EBFn Khu b\u1EA3o t\u1ED3n \u0111\u00F3. Nh\u1EEFng kh\u00F3a n\u00E0y n\u00EAn \u0111\u01B0\u1EE3c gi\u1EEF b\u00ED m\u1EADt. Ng\u01B0\u1EDDi d\u00F9ng c\u00F3 quy\u1EC1n truy c\u1EADp v\u00E0o kh\u00F3a n\u00E0y c\u00F3 th\u1EC3 t\u1EA3i xu\u1ED1ng c\u00E1c g\u00F3i SMART Mobile t\u1EEB Connect, xem n\u1ED9i dung g\u00F3i, t\u1EA3i l\u00EAn d\u1EEF li\u1EC7u quan s\u00E1t l\u00EAn Connect v\u00E0 t\u1EA1o/c\u1EADp nh\u1EADt c\u00E1c c\u1EA3nh b\u00E1o Connect. B\u1EA1n c\u00F3 th\u1EC3 thu h\u1ED3i quy\u1EC1n truy c\u1EADp b\u1EB1ng c\u00E1ch \u0111\u1EB7t l\u1EA1i kh\u00F3a. Vi\u1EC7c \u0111\u1EB7t l\u1EA1i kh\u00F3a s\u1EBD khi\u1EBFn t\u1EA5t c\u1EA3 c\u00E1c thi\u1EBFt b\u1ECB SMART Mobile hi\u1EC7n c\u00F3 kh\u00F4ng th\u1EC3 giao ti\u1EBFp v\u1EDBi SMART Connect. \u0110\u1EC3 kh\u00F4i ph\u1EE5c ch\u1EE9c n\u0103ng n\u00E0y, t\u1EA5t c\u1EA3 c\u00E1c g\u00F3i cho Khu b\u1EA3o t\u1ED3n b\u1ECB \u1EA3nh h\u01B0\u1EDFng s\u1EBD c\u1EA7n \u0111\u01B0\u1EE3c g\u1EE1 b\u1ECF, t\u1EA1o l\u1EA1i, sau \u0111\u00F3 t\u00E1i xu\u1EA5t ra c\u00E1c thi\u1EBFt b\u1ECB. Ch\u1EC9 c\u00E1c Qu\u1EA3n tr\u1ECB vi\u00EAn SMART Connect v\u00E0 Qu\u1EA3n tr\u1ECB vi\u00EAn Khu b\u1EA3o t\u1ED3n m\u1EDBi c\u00F3 th\u1EC3 \u0111\u1EB7t l\u1EA1i Kh\u00F3a API.<br>Kh\u00F3a ri\u00EAng \u0111\u01B0\u1EE3c s\u1EED d\u1EE5ng cho c\u00E1c g\u00F3i Tu\u1EA7n tra v\u00E0 Kh\u1EA3o s\u00E1t y\u00EAu c\u1EA7u quy\u1EC1n \u0111\u0103ng nh\u1EADp \u0111\u1EC3 t\u1EA3i xu\u1ED1ng. Kh\u00F3a SMART Collect \u0111\u01B0\u1EE3c s\u1EED d\u1EE5ng b\u1EDFi c\u00E1c g\u00F3i SMART Collect c\u00F3 s\u1EB5n cho c\u1ED9ng \u0111\u1ED3ng.
