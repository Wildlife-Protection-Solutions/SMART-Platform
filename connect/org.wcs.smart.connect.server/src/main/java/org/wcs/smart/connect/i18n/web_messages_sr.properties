cybertracker.apikeys=SMART Mobile API klju\u010devi
cybertracker.apikeysmessage1=SMART Mobile API klju\u010devi su uklju\u010deni u SMART Mobile pakete i omogu\u0107avaju komunikaciju izme\u0111u SMART Mobile-a i SMART Connect-a. Svako za\u0161ti\u0107eno podru\u010dje ima svoj klju\u010d koji ograni\u010dava pristup paketima povezanim sa tim podru\u010djem. Ovi klju\u010devi treba da ostanu tajni. Korisnici sa pristupom ovom klju\u010du mogu da preuzmu SMART Mobile pakete sa Connect-a, pregledaju sadr\u017eaj paketa, u\u010ditaju podatke o zapa\u017aanjima u Connect i kreiraju/a\u017euriraju upozorenja u Connect-u. Mo\u017ee\u0161 opozvati pristup resetovanjem klju\u010da. Resetovanjem klju\u010da svi postoje\u0107i SMART Mobile ure\u0111aji vi\u0161e ne\u0107e mo\u0107i da komuniciraju sa SMART Connect-om. Da bi se funkcionalnost vratila, svi paketi za pogo\u0111eno za\u0161ti\u0107eno podru\u010dje moraju biti uklonjeni, ponovo kreirani i ponovo izvezeni na ure\u0111aje. Samo SMART Connect administratori i administratori za\u0161ti\u0107enih podru\u010dja mogu resetovati API klju\u010d.<br>Privatni klju\u010devi se koriste za Patrol i Survey pakete koji zahtevaju autorizaciju za preuzimanje. SMART Collect klju\u010devi se koriste za SMART Collect pakete koji su dostupni \u0161iroj javnosti.
