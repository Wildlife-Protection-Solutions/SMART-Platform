users.desktopmessage=Mo\u017ee\u0161 kreirati i ure\u0111ivati Desktop korisnike u ZA koje su u\u010ditane na ovaj server. Ovi korisnici su odvojeni i razli\u010diti od Connect korisni\u010dkih imena i dozvola. Promene napravljene na ovoj stranici uti\u010du na Desktop korisnike koji poku\u0161avaju da sinhronizuju ili kontaktiraju ovaj Connect server, i kada se odre\u0111eni Desktop sinhronizuje sa promenama, budu\u0107e prijave na toj lokalnoj ma\u0161ini \u0107e biti pod uticajem tih promena. Mo\u017ee\u0161 tako\u0111e ure\u0111ivati korisnike u svim ZA, ali se uveri da razume\u0161 koja ZA \u0107e biti pogo\u0111ena pre nego \u0161to izabere\u0161 ovu opciju. Mo\u017ee\u0161 videti koja ZA su na ovom Connect serveru klikom na stavku menija 'Za\u0161ti\u0107ena podru\u010dja'.<br><br>Prikazani su samo aktivni SMART Desktop korisni\u010dki nalozi. Da bi ponovo aktivirao deaktivirani nalog, mora\u0161 koristiti SMART Desktop softver.
