cybertracker.apikeys=Kunci API SMART Mobile
cybertracker.apikeysmessage1=Kunci API SMART Mobile disertakan dalam pakej SMART Mobile dan membenarkan SMART Mobile berkomunikasi dengan SMART Connect. Setiap Kawasan Pemuliharaan mempunyai kuncinya sendiri yang mengehadkan akses kepada pakej yang berkaitan dengan Kawasan Pemuliharaan tersebut. Kunci-kunci ini harus dirahsiakan. Pengguna yang mempunyai akses kepada kunci ini dapat memuat turun pakej SMART Mobile dari Connect, melihat kandungan pakej, memuat naik data pemerhatian ke Connect, dan mencipta/mengemas kini makluman Connect. Anda boleh membatalkan akses dengan menetapkan semula kunci. Menetapkan semula kunci akan menyebabkan semua peranti SMART Mobile sedia ada tidak lagi dapat berkomunikasi dengan SMART Connect. Untuk memulihkan kefungsian ini, semua pakej untuk Kawasan Pemuliharaan yang terjejas perlu dialih keluar, dicipta semula, kemudian dieksport semula ke peranti. Hanya Pentadbir SMART Connect dan Pentadbir Kawasan Pemuliharaan boleh menetapkan semula Kunci API.\<br\>Kunci persendirian digunakan untuk pakej Rondaan dan Kajian yang memerlukan kebenaran untuk dimuat turun. Kunci SMART Collect digunakan oleh pakej SMART Collect yang tersedia untuk orang awam.
