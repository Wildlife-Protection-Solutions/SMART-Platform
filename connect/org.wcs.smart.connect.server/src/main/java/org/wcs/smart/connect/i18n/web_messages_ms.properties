sharedlinks.tokenexplanation=Token ini bertindak seperti 'ID sesi' dan menyampaikannya dengan permintaan anda menggunakan kebenaran keselamatan pengguna yang menciptanya, tanpa menyampaikan kata laluan pengguna kepada Pengesahan ASAS. Oleh itu, ANGGAP TOKEN INI SEPERTI KATA LALUAN, dan pastikannya selamat.
sharedlinks.tokeninfo=Token menyediakan akses kepada pelbagai sumber SMART Connect tanpa perlu log masuk menggunakan nama pengguna dan kata laluan. Kebenaran yang berkaitan dengan token adalah sama dengan kebenaran yang berkaitan dengan pengguna semasa. Token boleh ditetapkan untuk tamat tempoh atau dihadkan kepada alamat IP. Ia disediakan untuk pengguna yang ingin mengakses API SMART Connect.
sharedlinks.tokentitle=Token
sharedlinks.tokenwarning=Token ini bertindak sebagai kata laluan lain untuk akaun anda. Anggap ia sebagai kata laluan.
