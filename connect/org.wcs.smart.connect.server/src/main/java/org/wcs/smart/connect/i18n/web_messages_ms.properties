users.desktopmessage=Anda boleh mencipta dan mengedit pengguna Desktop dalam KP yang dimuat naik ke pelayan ini. Pengguna-pengguna ini adalah berasingan dan berbeza daripada nama pengguna dan kebenaran Connect. Perubahan yang dibuat di halaman ini akan mempengaruhi pengguna desktop yang cuba menyegerakkan atau menghubungi pelayan Connect ini, dan setelah Desktop tertentu telah menyegerakkan perubahan yang dibuat, log masuk masa hadapan pada mesin tempatan tersebut juga akan terjejas oleh sebarang perubahan yang dibuat di sini. Anda juga boleh mengedit pengguna di seluruh semua KP, pastikan anda memahami KP mana yang akan terjejas sebelum memilih pilihan ini. Anda boleh melihat KP mana yang ada di pelayan Connect ini dengan mengklik item menu 'Kawasan Pemuliharaan'.\<br\>\<br\>Hanya akaun pengguna SMART desktop yang aktif ditunjukkan di sini. Untuk mengaktifkan semula akaun yang dilumpuhkan, anda mesti menggunakan perisian SMART Desktop.
