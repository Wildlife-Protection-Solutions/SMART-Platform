sharedlinks.createnewdetails=Pautan ini membolehkan anda berkongsi data dengan orang yang tidak mempunyai akaun SMART Connect. Sesiapa sahaja dengan URL pautan boleh mengakses data tertentu yang telah dikongsi. Anda boleh memadam pautan di halaman ini untuk mengalih keluar akses kepada data yang berkaitan. Pautan dialih keluar secara automatik setelah tamat tempoh.
sharedlinks.createnewdetails2=Jangan sertakan sebarang data sensitif dalam pautan kongsi. Sentiasa tetapkan masa tamat yang sesingkat mungkin untuk keperluan anda bagi memastikan pautan tidak digunakan di luar tujuan yang dimaksudkan.
