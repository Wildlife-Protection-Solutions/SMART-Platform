RecoverCaDialog_RetainNewDataInfo=Ova opcija \u0107e privremeno sa\u010duvati podatke koji su dodati u konzervacionu oblast, ali jo\u0161 nisu sinhronizovani sa Connect-om. Nakon \u0161to se lokalna kopija resetuje da odgovara Connect-u, novi podaci \u0107e biti ponovo dodati u lokalnu bazu. Funkcija ne zadr\u017eava izmene podataka koji su ve\u0107 sinhronizovani sa Connect-om. Primeri novih podataka uklju\u010duju nove patrole, nove zaposlene, nove upite i nove opservacije dodate postoje\u0107im ta\u010dkama. Primeri izmena (koje se ne zadr\u017eavaju) uklju\u010duju promenu tipa patrole, izmenu podataka zaposlenih, ure\u0111ivanje lokacija ta\u010daka i a\u017euriranje atributa opservacija.
