RecoverCaDialog_DownloadAllOp=Ova opcija preuzima celu bazu podataka i skladi\u0161te fajlova sa SMART Connect-a i zamenjuje lokalnu konzervacionu oblast tim podacima. Najsporija je opcija i prenosi sve fajlove, ali garantuje da \u0107e konzervaciona oblast biti identi\u010dna kao na Connect-u. Koristite ovu opciju ako ste ve\u0107 poku\u0161ali da preuzmete samo izmene i i dalje imate gre\u0161ke u sinhronizaciji sa Connect-om.
RecoverCaDialog_DownloadModOp=Ova opcija preuzima celu bazu podataka i izmenjene (ili dodate) fajlove sa SMART Connect-a i spaja ih sa lokalnim podacima konzervacione oblasti. Br\u017ea je i prenosi manje podataka.
