CleanAndFixDialog_BufferDistance=Buffer distance (m):
CleanAndFixDialog_BufferDistanceInfo=Based on the points from the timeframe, a center point is calculated that marks the estimated end location of the trackpoints (if the recording was left on accidentally). Trackpoints within this specified radius of the center point are removed in reverse order, starting from the end, until a point outside the radius is found. Set this to -1 to disable point removal. The recommended value depends on your GPS device and typical signal accuracy. If tracks left recording are not cleaned up effectively, increase this radius to match the GPS error range observed in your data.
