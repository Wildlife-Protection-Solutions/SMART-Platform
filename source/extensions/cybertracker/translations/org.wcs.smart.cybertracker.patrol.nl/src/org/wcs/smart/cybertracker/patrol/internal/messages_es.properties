CleanAndFixDialog_BufferDistance=Distancia de amortiguamiento (m)\:
CleanAndFixDialog_BufferDistanceInfo=A partir de los puntos registrados en el periodo de tiempo, se calcula un punto central que indica la ubicaci\u00F3n estimada del final de la ruta (en caso de que la grabaci\u00F3n se haya dejado activada accidentalmente). Los puntos de la ruta que se encuentren dentro de este radio se eliminan en orden inverso, comenzando por el \u00FAltimo, hasta encontrar un punto fuera del radio. Para desactivar la eliminaci\u00F3n de puntos, establezca este valor en -1. El valor recomendado depende del dispositivo GPS y de la precisi\u00F3n habitual de la se\u00F1al. Si la eliminaci\u00F3n de puntos no resulta eficaz, aumente el radio para que coincida con el margen de error de GPS que se observa en los datos.
