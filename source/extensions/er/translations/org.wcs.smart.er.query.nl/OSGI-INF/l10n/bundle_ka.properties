QueryCategory.html_description=<p \u10E1\u10E2\u10D8\u10DA\u10D8\="\u10E8\u10E0\u10D8\u10E4\u10E2\u10D8-\u10DD\u10EF\u10D0\u10EE\u10D8\:\u10D5\u10D4\u10E0\u10D0\u10DC\u10D3\u10D0; \u10E8\u10E0\u10D8\u10E4\u10E2\u10D8\u10E1-\u10D6\u10DD\u10DB\u10D012px; \u10E8\u10E0\u10D8\u10E4\u10E2\u10D8-\u10EC\u10DD\u10DC\u10D0\:\u10DB\u10E3\u10E5\u10D8;">\u10D9\u10D5\u10DA\u10D4\u10D5\u10D8\u10E1 \u10E8\u10D4\u10D9\u10D8\u10D7\u10EE\u10D5\u10D4\u10D1\u10D8</p><p \u10E1\u10E2\u10D8\u10DA\u10D8\="\u10E8\u10E0\u10D8\u10E4\u10E2\u10D8-\u10DD\u10EF\u10D0\u10EE\u10D8\:\u10D5\u10D4\u10E0\u10D0\u10DC\u10D3\u10D0;\u10E8\u10E0\u10D8\u10E4\u10E2\u10D8\u10E1-\u10D6\u10DD\u10DB\u10D0\:11px">\u10E8\u10D4\u10D9\u10D8\u10D7\u10EE\u10D5\u10D0 \u10D9\u10D5\u10D4\u10DA\u10D5\u10D5\u10D8\u10E1 \u10DB\u10DD\u10DC\u10D0\u10EA\u10D4\u10DB\u10D4\u10D1\u10D8 \u10DB\u10DD\u10EA\u10D4\u10DB\u10E3\u10DA\u10D8 \u10D9\u10D5\u10DA\u10D4\u10D5\u10D0 \u10D3\u10D0 \u10DB\u10D8\u10E1\u10D8\u10D8\u10E1 \u10D0\u10E2\u10E0\u10D8\u10D1\u10E3\u10E2\u10D4\u10D1\u10D8\u10D3\u10D0\u10DB\u10D0\u10E2\u10D4\u10D1\u10D8\u10D7 \u10DB\u10DD\u10DC\u10D0\u10EA\u10D4\u10DB\u10D7\u10D0 \u10DB\u10DD\u10D3\u10D4\u10DA\u10D8\u10E1 \u10D4\u10DA\u10D4\u10DB\u10D4\u10DC\u10E2\u10D4\u10D1\u10D6\u10D4\u10E0\u10DD\u10D2\u10DD\u10E0\u10EA \u10E4\u10D8\u10DA\u10E2\u10E0\u10D4\u10D1\u10D8 \u10D3\u10D0 \u10E8\u10D4\u10EF\u10D0\u10DB\u10D4\u10D1\u10D8\u10E1 \u10DE\u10D0\u10E0\u10D0\u10DB\u10D4\u10E2\u10E0\u10D4\u10D1\u10D8.</p>
