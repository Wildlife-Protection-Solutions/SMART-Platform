about.command.mnemonic=A
aboutText=\u0ec0\u0e84\u0eb7\u0ec8\u0ead\u0e87\u0ea1\u0eb7\u0e97\u0eb5\u0ec8\u0ec3\u0e8a\u0ec9\u0ec0\u0e82\u0ebb\u0ec9\u0eb2\u0ec3\u0e99\u0e81\u0eb2\u0e99\u0e81\u0ea7\u0e94\u0e81\u0eb2\u0e95\u0eb4\u0e94\u200b\u0e95\u0eb2\u0ea1\u200b\u200b\u0e9e\u0eb7\u0ec9\u0e99\u200b\u0e97\u0eb5\u0ec8\u200b \u0ec1\u0ea5\u0eb0 \u200b\u0e81\u0eb2\u0e99\u200b\u0ea5\u0eb2\u0e8d\u200b\u0e87\u0eb2\u0e99\u200b\u200b. \n\n\u0eaa\u0eb0\u200b\u0e9a\u0eb1\u0e9a\u200b\u200b\: {0} \n\n\u0ea5\u0eb4\u0e94\u0e82\u0eb0\u200b\u0eaa\u0eb4\u0e94 (C\u200b) 2012 \u0ead\u0ebb\u0e87\u0e81\u0eb2\u0e99\u0ead\u0eb0\u0e99\u0eb8\u0ea5\u0eb1\u0e81\u0eaa\u0eb1\u0e94\u200b\u0e9b\u0ec8\u0eb2\u200b\n\nSMART \u0ec4\u0e94\u0ec9\u0e96\u0eb7\u0e81\u0e9e\u0eb1\u0e94\u0e97\u0eb0\u0e99\u0eb2\u0e82\u0eb6\u0ec9\u0e99\u0ec2\u0e94\u0e8d\u200b\u0e9a\u0eb1\u0e99\u0e94\u0eb2\u0e84\u0eb9\u0ec8\u0eae\u0ec8\u0ea7\u0ea1\u0e87\u0eb2\u0e99\u0e82\u0ead\u0e87 SMART. \u0ec3\u0e99\u0ec0\u0ea7\u0ea5\u0eb2\u0e97\u0eb5\u0ec8\u0ec0\u0ead\u0ebb\u0eb2\u0ead\u0ead\u0e81\u0ea1\u0eb2 \u0ec3\u0e8a\u0ec9\u0e99\u0eb5\u0ec9 \u0ec1\u0ea1\u0ec8\u0e99\u0e9b\u0eb0\u200b\u0e81\u0ead\u0e9a\u0ea1\u0eb5 Frankfurt Zoological Society, North Carolina Zoological Park\u200b, Wildlife Conservation Society, World Wildlife Fund, Zoological Society of London, and\u00a0CITES-Monitoring Illegal Killing of Elephants (MIKE) program. \n\n\nSMART \u0ec4\u0e94\u0ec9\u200b\u0e96\u0eb7\u0e81\u0e9e\u0eb1\u0e94\u0e97\u0eb0\u0e99\u0eb2\u0e82\u0eb6\u0ec9\u0e99 \u200b\u0ec1\u0ea5\u0eb0 \u200b\u0ec0\u0ead\u0ebb\u0eb2\u0ead\u0ead\u0e81\u0ea1\u0eb2\u0e99\u0ecd\u0eb2\u0ec3\u0e8a\u0ec9 \u200b\u0ec0\u0e9e\u0eb7\u0ec8\u0ead\u0ec3\u0eab\u0ec9\u200b\u0eaa\u0ead\u0e94\u200b\u0e84\u0ec8\u0ead\u0e87\u200b\u0e81\u0eb1\u0e9a\u200b\u0eab\u0ebc\u0eb1\u0e81\u200b\u0e81\u0eb2\u0e99 \u0e82\u0ead\u0e87\u0e81\u0eb2\u0e99\u200b\u0ead\u0eb0\u200b\u0e99\u0eb8\u200b\u0ea5\u0eb1\u0e81, \u0ec0\u0e9e\u0eb7\u0ec8\u0ead\u0ec3\u0eab\u0ec9\u0ec0\u0e82\u0ebb\u0ec9\u0eb2\u0ec0\u0e96\u0eb4\u0e87\u0e9c\u0ebb\u0e99\u200b\u0e9b\u0eb0\u200b\u0ec2\u0eab\u0e8d\u0e94\u200b\u0ec0\u0e8a\u0eb4\u0ec8\u0e87\u200b\u0e81\u0eb1\u0e99 \u200b\u0ec1\u0ea5\u0eb0 \u200b\u0e81\u0eb1\u0e99\u200b,\u200b \u0eaa\u0eb4\u0e94\u200b\u0e97\u0eb4 \u200b\u0ec1\u0ea5\u0eb0\u200b \u0edc\u0ec9\u0eb2\u0e97\u0eb5\u0ec8\u200b\u0eae\u0eb1\u0e9a\u200b\u0e9c\u0eb4\u0e94\u200b\u0e8a\u0ead\u0e9a\u200b. SMART \u0ec1\u0ea1\u0ec8\u0e99\u0ec0\u0e9b\u0eb1\u0e99\u0ec1\u0eab\u0ebc\u0ec8\u0e87\u0e82\u0ecd\u0ec9\u0ea1\u0eb9\u0e99\u200b\u0e97\u0eb5\u0ec8\u0ec0\u0e9b\u0eb5\u0e94\u0e81\u0ec9\u0ea7\u0eb2\u0e87\u200b, \u0e9a\u0ecd\u0ec8\u200b\u0eaa\u0eb0\u0eab\u0e87\u0ea7\u0e99\u0ea5\u0eb4\u0e94\u0e81\u0eb0\u0eaa\u0eb4\u0e94\u200b \u0ec1\u0ea5\u0eb0 \u0e99\u0ecd\u0eb2\u0ec3\u0e8a\u0ec9\u200b\u0e9f\u0ea3\u0eb5\u200b. \u0eaa\u0eb2\u0ea1\u0eb2\u0e94\u0e81\u0ea7\u0e94\u0eaa\u0ead\u0e9a\u200b\u0e82\u0ecd\u0ec9\u200b\u0ea1\u0eb9\u0e99\u200b\u0ec0\u0e9e\u0eb5\u0ec8\u0ea1\u200b\u0ec0\u0e95\u0eb5\u0ea1\u0ec4\u0e94\u0ec9\u0e97\u0eb5\u0ec8\u200b\: http\://www.smartconservationsoftware.org\n
