aboutText=\u0417\u0430\u0439\u043D\u0430\u0430\u0441 \u043C\u043E\u043D\u0438\u0442\u043E\u0440\u0438\u043D\u0433 \u0445\u0438\u0439\u0445, \u0442\u0430\u0439\u043B\u0430\u0433\u043D\u0430\u0445 \u0445\u044D\u0440\u044D\u0433\u0441\u044D\u043B \n \n\u0425\u0443\u0432\u0438\u043B\u0431\u0430\u0440\: {0} \n \n\u0417\u043E\u0445\u0438\u043E\u0433\u0447\u0438\u0439\u043D \u044D\u0440\u0445 (C) 2012-2015 \u041E\u043D\u0433\u043E\u043D \u0431\u0430\u0439\u0433\u0430\u043B\u044C \u0445\u0430\u043C\u0433\u0430\u0430\u043B\u0430\u0445 \u0441\u0430\u043D\n\nSMART \u043F\u0440\u043E\u0433\u0440\u0430\u043C\u044B\u0433 SMART Partnership/\u0422\u04AF\u043D\u0448\u043B\u044D\u043B\u044D\u044D\u0440 \u0431\u043E\u043B\u043E\u0432\u0441\u0440\u0443\u0443\u043B\u0436 \u0431\u04AF\u0442\u044D\u044D\u0441\u044D\u043D. \u0410\u043D\u0445 \u0445\u044D\u0440\u044D\u0433\u043B\u044D\u044D\u043D\u0434 \u0433\u0430\u0440\u0433\u0430\u0445 \u04AF\u0435\u0434 CITES-\u0417\u0430\u0430\u043D \u0445\u0443\u0443\u044C \u0431\u0443\u0441\u0430\u0430\u0440 \u0430\u0433\u043D\u0430\u0445\u0430\u0434 \u043C\u043E\u043D\u0438\u0442\u043E\u0440\u0438\u043D\u0433 \u0445\u0438\u0439\u0445 \u0445\u04E9\u0442\u04E9\u043B\u0431\u04E9\u0440(MIKE), \u0424\u0440\u0430\u043D\u043A\u0444\u0443\u0440\u0442\u044B\u043D \u0430\u043C\u044C\u0442\u0430\u043D \u0441\u0443\u0434\u043B\u0430\u043B\u044B\u043D \u0445\u04AF\u0440\u044D\u044D\u043B\u044D\u043D, \u0423\u043C\u0430\u0440\u0434 \u041A\u0430\u0440\u043E\u043B\u0438\u043D\u0430\u0433\u0438\u0439\u043D \u0430\u043C\u044C\u0442\u0430\u043D \u0441\u0443\u0434\u043B\u0430\u043B\u044B\u043D \u0445\u04AF\u0440\u044D\u044D\u043B\u044D\u043D, \u041F\u0430\u043D\u0442\u0435\u0440\u0430, \u041F\u0438\u0439\u0441 \u0446\u044D\u0446\u044D\u0440\u043B\u044D\u0433\u0442 \u0445\u04AF\u0440\u044D\u044D\u043B\u044D\u043D\u0433\u0438\u0439\u043D \u0441\u0430\u043D, \u041E\u043D\u0433\u043E\u043D \u0431\u0430\u0439\u0433\u0430\u043B\u044C \u0445\u0430\u043C\u0433\u0430\u0430\u043B\u0430\u0445 \u043D\u0438\u0439\u0433\u044D\u043C\u043B\u044D\u0433, \u041E\u043D\u0433\u043E\u043D \u0431\u0430\u0439\u0433\u0430\u043B\u044C \u0445\u0430\u043C\u0433\u0430\u0430\u043B\u0430\u0445 \u0441\u0430\u043D \u0431\u043E\u043B\u043E\u043D \u041B\u043E\u043D\u0434\u043E\u043D\u0433\u0438\u0439\u043D \u0430\u043C\u044C\u0442\u0430\u043D \u0441\u0443\u0434\u043B\u0430\u043B\u044B\u043D \u043D\u0438\u0439\u0433\u044D\u043C\u043B\u044D\u0433\u04AF\u04AF\u0434 \u043E\u0440\u0436 \u0431\u0430\u0439\u0441\u0430\u043D. SMART - \u044B\u0433 \u043D\u044D\u044D\u043B\u0442\u0442\u044D\u0439, \u0445\u0430\u0440\u0438\u043B\u0446\u0430\u043D \u0430\u0448\u0438\u0433\u0442\u0430\u0439, \u044D\u0440\u0445, \u0445\u0430\u0440\u0438\u0443\u0446\u043B\u0430\u0433\u044B\u043D \u0437\u0430\u0440\u0447\u0438\u043C\u0442\u0430\u0439 Conservation Commons principles/ \u0431\u0443\u044E\u0443 \u0411\u0430\u0439\u0433\u0430\u043B\u044C \u0445\u0430\u043C\u0433\u0430\u0430\u043B\u0430\u0445 \u0438\u0440\u0433\u044D\u0434\u0438\u0439\u043D \u0437\u0430\u0440\u0447\u0438\u043C\u0434 \u04AF\u043D\u0434\u044D\u0441\u043B\u044D\u043D \u0431\u043E\u043B\u043E\u0432\u0441\u0440\u0443\u0443\u043B\u0436, \u0445\u044D\u0440\u044D\u0433\u043B\u044D\u044D\u043D\u0434 \u0433\u0430\u0440\u0433\u0430\u0441\u0430\u043D. SMART \u043D\u044C \u043D\u044D\u044D\u043B\u0442\u0442\u044D\u0439, \u04E9\u043C\u0447\u043B\u04E9\u043B\u0438\u0439\u043D \u0431\u0443\u0441, \u04AF\u043D\u044D\u0433\u04AF\u0439 \u0441\u0443\u0440\u0432\u0430\u043B\u0436 \u044E\u043C. \u041D\u044D\u043C\u044D\u043B\u0442 \u043C\u044D\u0434\u044D\u044D\u043B\u043B\u0438\u0439\u0433 \u0434\u0430\u0440\u0430\u0430\u0445\u044C \u0445\u0430\u044F\u0433\u0430\u0430\u0441 \u0430\u0432\u043D\u0430 \u0443\u0443 visit\: http\://www.smartconservationtools.org
