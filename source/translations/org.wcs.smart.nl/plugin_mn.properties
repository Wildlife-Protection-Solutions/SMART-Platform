aboutText=\u0425\u044f\u043d\u0430\u043b\u0442 \u0448\u0430\u043b\u0433\u0430\u043b\u0442\u044b\u0433 \u043e\u0440\u043e\u043d \u0437\u0430\u0439\u0434 \u0433\u04af\u0439\u0446\u044d\u0442\u0433\u044d\u0445, \u0442\u0430\u0439\u043b\u0430\u0433\u043d\u0430\u0445 \u0430\u0440\u0433\u0430\n \n\u0425\u0443\u0432\u0438\u043b\u0431\u0430\u0440\: {0} \n \n\u0417\u043e\u0445\u0438\u043e\u0433\u0447\u0438\u0439\u043d \u044d\u0440\u0445 (C) 2012-2019 \u0411\u0430\u0439\u0433\u0430\u043b\u044c, \u0437\u044d\u0440\u043b\u044d\u0433 \u0430\u043c\u044c\u0442\u0434\u044b\u0433 \u0445\u0430\u043c\u0433\u0430\u0430\u043b\u0430\u0445 \u043d\u0438\u0439\u0433\u044d\u043c\u043b\u044d\u0433 /WCS/ \n\n\u0421\u041c\u0410\u0420\u0422 \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u044b\u0433 \u0421\u041c\u0410\u0420\u0422 \u0422\u04af\u043d\u0448\u043b\u044d\u043b\u044d\u044d\u0440 \u0431\u043e\u043b\u043e\u0432\u0441\u0440\u0443\u0443\u043b\u0436 \u0431\u04af\u0442\u044d\u044d\u0441\u044d\u043d. \u0410\u043d\u0445 \u0445\u044d\u0440\u044d\u0433\u043b\u044d\u044d\u043d\u0434 \u0433\u0430\u0440\u0433\u0430\u0445 \u04af\u0435\u0434 CITES-\u0417\u0430\u0430\u043d \u0445\u0443\u0443\u044c \u0431\u0443\u0441\u0430\u0430\u0440 \u0430\u0433\u043d\u0430\u0445\u0430\u0434 \u043c\u043e\u043d\u0438\u0442\u043e\u0440\u0438\u043d\u0433 \u0445\u0438\u0439\u0445 \u0445\u04e9\u0442\u04e9\u043b\u0431\u04e9\u0440(MIKE), \u0424\u0440\u0430\u043d\u043a\u0444\u0443\u0440\u0442\u044b\u043d \u0430\u043c\u044c\u0442\u0430\u043d \u0441\u0443\u0434\u043b\u0430\u043b\u044b\u043d \u0445\u04af\u0440\u044d\u044d\u043b\u044d\u043d, \u0423\u043c\u0430\u0440\u0434 \u041a\u0430\u0440\u043e\u043b\u0438\u043d\u0430\u0433\u0438\u0439\u043d \u0430\u043c\u044c\u0442\u0430\u043d \u0441\u0443\u0434\u043b\u0430\u043b\u044b\u043d \u0445\u04af\u0440\u044d\u044d\u043b\u044d\u043d, \u041f\u0430\u043d\u0442\u0435\u0440\u0430, \u041f\u0438\u0439\u0441 \u0446\u044d\u0446\u044d\u0440\u043b\u044d\u0433\u0442 \u0445\u04af\u0440\u044d\u044d\u043b\u044d\u043d\u0433\u0438\u0439\u043d \u0441\u0430\u043d, \u0411\u0430\u0439\u0433\u0430\u043b\u044c, \u0437\u044d\u0440\u043b\u044d\u0433 \u0430\u043c\u044c\u0442\u0434\u044b\u0433 \u0445\u0430\u043c\u0433\u0430\u0430\u043b\u0430\u0445 \u043d\u0438\u0439\u0433\u044d\u043c\u043b\u044d\u0433 /WCS/, \u0414\u044d\u043b\u0445\u0438\u0439\u043d \u0431\u0430\u0439\u0433\u0430\u043b\u044c \u0445\u0430\u043c\u0433\u0430\u0430\u043b\u0430\u0445 \u0441\u0430\u043d \u0431\u043e\u043b\u043e\u043d \u041b\u043e\u043d\u0434\u043e\u043d\u0433\u0438\u0439\u043d \u0430\u043c\u044c\u0442\u0430\u043d \u0441\u0443\u0434\u043b\u0430\u043b\u044b\u043d \u043d\u0438\u0439\u0433\u044d\u043c\u043b\u044d\u0433\u04af\u04af\u0434 \u043e\u0440\u0436 \u0431\u0430\u0439\u0441\u0430\u043d. \u0421\u041c\u0410\u0420\u0422 - \u044b\u0433 \u043d\u044d\u044d\u043b\u0442\u0442\u044d\u0439, \u0445\u0430\u0440\u0438\u043b\u0446\u0430\u043d \u0430\u0448\u0438\u0433\u0442\u0430\u0439, \u044d\u0440\u0445, \u0445\u0430\u0440\u0438\u0443\u0446\u043b\u0430\u0433\u044b\u043d \u0437\u0430\u0440\u0447\u0438\u043c\u0442\u0430\u0439 Conservation Commons principles/ \u0431\u0443\u044e\u0443 \u0411\u0430\u0439\u0433\u0430\u043b\u044c \u0445\u0430\u043c\u0433\u0430\u0430\u043b\u0430\u0445 \u0438\u0440\u0433\u044d\u0434\u0438\u0439\u043d \u0437\u0430\u0440\u0447\u0438\u043c\u0434 \u04af\u043d\u0434\u044d\u0441\u043b\u044d\u043d \u0431\u043e\u043b\u043e\u0432\u0441\u0440\u0443\u0443\u043b\u0436, \u0445\u044d\u0440\u044d\u0433\u043b\u044d\u044d\u043d\u0434 \u0433\u0430\u0440\u0433\u0430\u0441\u0430\u043d. \u0421\u041c\u0410\u0420\u0422 \u043d\u044c \u043d\u044d\u044d\u043b\u0442\u0442\u044d\u0439, \u04e9\u043c\u0447\u043b\u04e9\u043b\u0438\u0439\u043d \u0431\u0443\u0441, \u04af\u043d\u044d\u0433\u04af\u0439 \u0441\u0443\u0440\u0432\u0430\u043b\u0436 \u044e\u043c. \u041d\u044d\u043c\u044d\u043b\u0442 \u043c\u044d\u0434\u044d\u044d\u043b\u043b\u0438\u0439\u0433 \u0434\u0430\u0440\u0430\u0430\u0445\u044c \u0445\u0430\u044f\u0433\u0430\u0430\u0441 \u0430\u0432\u043d\u0430 \u0443\u0443 visit\: http\://www.smartconservationtools.org
