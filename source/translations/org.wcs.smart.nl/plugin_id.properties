aboutText=Spatial Monitoring and Reporting Tool.\n \nVersion\: {0} \n \nCopyright (C) 2012-2014 Wildlife Conservation Society\n\nSMART telah dikembangkan melalui The SMART Partnership. Pada saat rilis ini\ntermasuk Frankfurt Zoological Society, North Carolina Zoological Park, Wildlife \nConservation Society, World Wildlife Fund, Zoological Society of London, dan \nCITES-Monitoring Illegal Killing of Elephants (MIKE) program.\n\nSMART telah dikembangkan dan dirilis sesuai dengan Prinsip Konservasi Bersama untuk akses terbuka, saling menguntungkan, serta hak dan tanggung jawab. SMART adalah aplikasi terbuka,\nnon-eksklusif dan bebas untuk diperoleh. Untuk informasi lebih lanjut, kunjungi\:\nhttp\://www.smartconservationtools.org
