aboutText=\u10db\u10dd\u10dc\u10d8\u10e2\u10dd\u10e0\u10d8\u10dc\u10d2\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10e0\u10d4\u10de\u10dd\u10e0\u10e2\u10d8\u10e0\u10d4\u10d1\u10d8\u10e1 \u10e1\u10de\u10d4\u10ea\u10d8\u10d0\u10da\u10e3\u10e0\u10d8 \u10e1\u10d0\u10e8\u10e3\u10d0\u10da\u10d4\u10d1\u10d0.\n \n\u10d5\u10d4\u10e0\u10e1\u10d8\u10d0\: {0} \n \n\u10e1\u10d0\u10d0\u10d5\u10e2\u10dd\u10e0\u10dd \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8 (C) 2012 \u10d5\u10d4\u10da\u10e3\u10e0\u10d8 \u10d1\u10e3\u10dc\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0\n\nSMART-\u10d8 \u10e9\u10d0\u10db\u10dd\u10e7\u10d0\u10da\u10d8\u10d1\u10d3\u10d0 SMART-\u10d8\u10e1 \u10de\u10d0\u10e0\u10e2\u10dc\u10d8\u10dd\u10e0\u10dd\u10d1\u10d8\u10e1 \u10e4\u10d0\u10e0\u10d2\u10da\u10d4\u10d1\u10e8\u10d8.  \u10d0\u10db \u10e0\u10d4\u10da\u10d8\u10d6\u10d8\u10e1 \u10d3\u10e0\u10dd\u10e1 \u10db\u10dd\u10d8\u10ea\u10d0\u10d5\u10e1 \u10e4\u10e0\u10d0\u10dc\u10d9\u10e4\u10e3\u10e0\u10e2\u10d8\u10e1 \u10d6\u10dd\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0\u10e1 this \nincludes, \u10e9\u10e0\u10d3\u10d8\u10da\u10dd\u10d4\u10d7 \u10d9\u10d0\u10e0\u10dd\u10da\u10d8\u10dc\u10d8\u10e1 \u10d6\u10dd\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0 \u10de\u10d0\u10e0\u10d9\u10e1, \u10d5\u10d4\u10da\u10e3\u10e0\u10d8 \u10d1\u10e3\u10dc\u10d4\u10d1\u10d8\u10e1\n\u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0, \u10db\u10e1\u10dd\u10e4\u10da\u10d8\u10dd \u10d1\u10e3\u10dc\u10d4\u10d1\u10d8\u10e1 \u10d3\u10d0\u10ea\u10d5\u10d8\u10e1 \u10e4\u10dd\u10dc\u10d3\u10d8, \u10da\u10dd\u10dc\u10d3\u10dd\u10dc\u10d8\u10e1 \u10d6\u10dd\u10dd\u10da\u10dd\u10d2\u10d8\u10e3\u10e0\u10d8 \u10e1\u10d0\u10d6\u10dd\u10d2\u10d0\u10d3\u10dd\u10d4\u10d1\u10d0 \u10d3\u10d0  \n\u10e5\u10d0\u10da\u10d0\u10e5\u10d4\u10d1\u10d8\u10e1 \u10db\u10dd\u10dc\u10d8\u10e2\u10dd\u10e0\u10d8\u10dc\u10d2\u10d8 \u10e1\u10de\u10d8\u10da\u10dd\u10d4\u10d1\u10d8\u10e1 \u10d0\u10e0\u10d0\u10da\u10d4\u10d2\u10d0\u10da\u10e3\u10e0\u10d8 \u10db\u10d9\u10d5\u10da\u10d4\u10da\u10dd\u10d1\u10d0 (MIKE) \u10de\u10e0\u10dd\u10d2\u10e0\u10d0\u10db\u10d0. \n\nSMART -\u10d8 \u10e8\u10d4\u10d8\u10e5\u10db\u10dc\u10d0 \u10d3\u10d0  \u10d2\u10d0\u10db\u10dd\u10d8\u10ea\u10d0 \u10e1\u10d0\u10d4\u10e0\u10d7\u10dd \u10d9\u10dd\u10dc\u10e1\u10d4\u10e0\u10d5\u10d0\u10ea\u10d8\u10d8\u10e1 \u10de\u10e0\u10d8\u10dc\u10ea\u10d8\u10de\u10d4\u10d1\u10d8\u10e1 \u10d2\u10d0\u10d7\u10d5\u10d0\u10da\u10d8\u10e1\u10ec\u10d8\u10dc\u10d4\u10d1\u10d8\u10d7 \u10e6\u10d8\u10d0 \u10d3\u10d0\u10e8\u10d5\u10d4\u10d1\u10d8\u10e1,\n\u10d4\u10e0\u10d7\u10dd\u10d1\u10da\u10d8\u10ea\u10d8 \u10e1\u10d0\u10e0\u10d2\u10d4\u10d1\u10da\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1 \u10d3\u10d0 \u10e3\u10e4\u10da\u10d4\u10d1\u10d4\u10d1\u10d8\u10e1\u10d0 \u10d3\u10d0 \u10db\u10dd\u10d5\u10d0\u10da\u10d4\u10dd\u10d1\u10d4\u10d1\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1. SMART \u10d0\u10e0\u10d8\u10e1 \u10e6\u10d8\u10d0 \u10e1\u10d0\u10e8\u10e3\u10d0\u10da\u10d4\u10d1\u10d0,\n\u10d0\u10e0\u10d0 \u10e1\u10d0\u10d9\u10e3\u10d7\u10e0\u10d4\u10d1\u10e0\u10d8\u10d5\u10d8 \u10d3\u10d0 \u10e3\u10e4\u10d0\u10e1\u10dd \u10d2\u10d0\u10db\u10dd\u10e7\u10d4\u10dc\u10d4\u10d1\u10d8\u10e1\u10d7\u10d5\u10d8\u10e1.\u10d3\u10d0\u10db\u10d0\u10e2\u10d4\u10d1\u10d8\u10d7\u10d8 \u10d8\u10dc\u10e4\u10dd\u10e0\u10db\u10d0\u10ea\u10d8\u10d8\u10e1\u10d0\u10d7\u10d5\u10d8\u10e1 \u10dc\u10d0\u10ee\u10d4\u10d7\:\nhttp\://www.smartconservationsoftware.org\n 
