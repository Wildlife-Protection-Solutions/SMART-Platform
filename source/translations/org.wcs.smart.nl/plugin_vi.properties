aboutText=C\u00f4ng c\u1ee5 gi\u00e1m s\u00e1t v\u00e0 b\u00e1o c\u00e1o kh\u00f4ng gian. Phi\u00ean b\u1ea3n\: {0} B\u1ea3n quy\u1ec1n (C) 2012 H\u1ed9i b\u1ea3o t\u1ed3n thi\u00ean nhi\u00ean SMART \u0111\u00e3 \u0111\u01b0\u1ee3c x\u00e2y d\u1ef1ng th\u00f4ng qua Ch\u01b0\u01a1ng tr\u00ecnh \u0111\u1ed1i t\u00e1c SMART. T\u1ea1i th\u1eddi \u0111i\u1ec3m ban h\u00e0nh, n\u00f3 bao g\u1ed3m c\u1ea3 H\u1ed9i Sinh v\u1eadt Frankfurt, V\u01b0\u1eddn th\u00fa B\u1eafc Carolina, H\u1ed9i b\u1ea3o t\u1ed3n thi\u00ean nhi\u00ean, Qu\u1ef9 b\u1ea3o v\u1ec7 thi\u00ean thi\u00ean th\u1ebf gi\u1edbi, H\u1ed9i sinh v\u1eadt London v\u00e0 ch\u01b0\u01a1ng tr\u00ecnh gi\u00e1m s\u00e1t s\u0103n b\u1eaft voi tr\u00e1i ph\u00e9p CITES (MIKE). SMART \u0111\u00e3 \u0111\u01b0\u1ee3c x\u00e2y d\u1ef1ng v\u00e0 c\u00f4ng b\u1ed1 theo c\u00e1c nguy\u00ean t\u1eafc b\u1ea3o t\u1ed3n chung v\u1ec1 t\u1ef1 do ti\u1ebfp c\u1eadn, chia s\u1ebb l\u1ee3i \u00edch, quy\u1ec1n v\u00e0 tr\u00e1ch nhi\u1ec7m. SMART l\u00e0 m\u1ed9t ngu\u1ed3n m\u1edf, kh\u00f4ng thu\u1ed9c quy\u1ec1n s\u1edf h\u1eefu c\u1ee7a ai v\u00e0 t\u1ef1 do s\u1eed d\u1ee5ng. \u0110\u1ec3 bi\u1ebft th\u00eam th\u00f4ng tin, tham kh\u1ea3o\: http\://www.smartconservationtools.org
