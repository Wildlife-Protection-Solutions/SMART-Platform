aboutText=Ferramenta de Monitoramento Espacial e Cria\u00e7\u00e3o de Relat\u00f3rios.\n \nVers\u00e3o\: {0} \n \nCopyright (C) 2012 Wildlife Conservation Society\n\nSMART foi desenvolvido atrav\u00e9s da Parceria SMART.  \u00c0 \u00e9poca do lan\u00e7amento, ela inclu\u00eda \n Sociedade Zool\u00f3gica de Frankfurt, Parque Zool\u00f3gico da Carolina do Norte,Wildlife \nConservation Society, World Wildlife Fund, Sociedade Zool\u00f3gica de Londres e \nCITES - Programa de Monitorimento de Abate Ilegal de elefantes (MIKE). \n\nA SMART foi desenvolvida e lan\u00e7ada em conformidade com os princ\u00edpios comuns de conserva\u00e7\u00e3o\nde acesso aberto, benef\u00edcio m\u00fatuo, e direitos e responsabilidades. SMART \u00e9 um aplicado open source (c\u00f3digo aberto), \nde denomina\u00e7\u00e3o comum e obten\u00e7\u00e3o gratuita. Para mais informa\u00e7\u00f5es, visite\:\nhttp\://www.smartconservationsoftware.org\n 
