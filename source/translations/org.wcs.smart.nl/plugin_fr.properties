aboutText=Outil de suivi spatial et d''\u00e9dition de rapports.\n \nVersion\: {0} \n \nCopyright (C) 2012 Wildlife Conservation Society\n\nSMART a \u00e9t\u00e9 d\u00e9velopp\u00e9 par le partenariat SMART. Au moment de la parution, cela inclut la Soci\u00e9t\u00e9 Zoologique de Francfort, le Parc Zoologique de Caroline du Nord,\nla Wildlife Conservation Society, le World Wildlife Fund, la Zoological Society of London et le programme CITES-MIKE (Monitoring Illegal Killing of Elephants).\n\nSMART a \u00e9t\u00e9 d\u00e9velopp\u00e9 et publi\u00e9 en accord avec les principes du Patrimoine des connaissances de la nature, de libre acc\u00e8s, de b\u00e9n\u00e9fice mutuel et de droits et responsabilit\u00e9s.\nSMART est libre d''acc\u00e8s, non prot\u00e9g\u00e9 et gratuit. Pour plus d''information, consultez \:\nhttp\://www.smartconservationtools.org\n 
