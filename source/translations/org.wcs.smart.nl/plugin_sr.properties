aboutText=Alat za prostorno pra\u0107enje i izve\u0161tavanje\n \nVerzija: {0} \nPuna verzija: {1} \n \nCopyright (C) 2012-2022 Wildlife Conservation Society\n\nSMART je razvijen kroz SMART partnerstvo. U vreme izdavanja ovo uklju\u010duje Wildlife Protection Solutions, Frankfurt Zoological Society, re:wild, North Carolina Zoo, Panthera, Peace Parks Foundation, Wildlife Conservation Society, World Wildlife Fund i Zoological Society of London. SMART je razvijen i objavljen u skladu sa principima Conservation Commons o otvorenom pristupu, uzajamnoj koristi, pravima i odgovornostima. SMART je otvorenog koda, nevlasni\u010dki i besplatno se nabavlja. Za vi\u0161e informacija, poseti: http://www.smartconservationtools.org\n\nPreporu\u010deni format citiranja:\nSMART. Ra\u010dunarski softver. Alat za prostorno pra\u0107enje i izve\u0161tavanje. Verzija {0}. <datum pristupa>. www.smartconservationtools.org
