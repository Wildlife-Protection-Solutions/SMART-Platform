aboutText=Kifaa nafasi cha kusimamia na kuripoti \nToleo\: {0} \nToleo lote\: {1} \n \nImechapwa (C) 2012-2018 Jamii ya uhifadhi wa wanyamapori\n\nSMART zimeendelezwa kupitia ushirikiano wa SMART. \nWakati wa kutoa hii inahusisha ulinzi wa wanyama pori suluhisho,Frankfurt Zoological Society, Global Wildlife Conservation, North Carolina Zoo, Panthera, Peace Parks Foundation, Wildlife Conservation Society, World Wildlife Fund, and Zoological Society of London. SMART has been developed and released in accordance with the Conservation Commons principles of open access, mutual benefit, and rights and responsibilities. SMART is open source, non-proprietary and free to obtain. For more information, visit\: http\://www.smartconservationtools.org\n\nUmbizo la mtajo linalopendekezwa\:\nSMART. Programu ya kompyuta. Kifaa nafasi cha kusimamia na kuripotia. Toleo {0}. <Tarehe iliyopokelewa>. www.smartconservationtools.org
