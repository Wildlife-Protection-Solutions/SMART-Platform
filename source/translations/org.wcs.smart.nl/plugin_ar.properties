about.command.label=\u0639\u0646 SMART
about.command.mnemonic=A
aboutText=\u0623\u062F\u0627\u0629 \u0627\u0644\u0631\u0635\u062F \u0648\u0627\u0644\u0625\u0628\u0644\u0627\u063A \u0627\u0644\u0645\u0643\u0627\u0646\u064A\n \n\u0627\u0644\u0646\u0633\u062E\u0629\: {0} \n\u0627\u0644\u0646\u0633\u062E\u0629 \u0627\u0644\u0643\u0627\u0645\u0644\u0629\: {1} \n \n\u062D\u0642\u0648\u0642 \u0627\u0644\u0646\u0634\u0631 (C)  2012-2018 \u062C\u0645\u0639\u064A\u0629 \u0627\u0644\u0645\u062D\u0627\u0641\u0638\u0629 \u0639\u0644\u0649 \u0627\u0644\u062D\u064A\u0627\u0629 \u0627\u0644\u0628\u0631\u064A\u0629\n\n\u062A\u0645 \u062A\u0637\u0648\u064A\u0631 SMART \u0645\u0646 \u062E\u0644\u0627\u0644 \u0634\u0631\u0643\u0627\u0621 SMART. \u0641\u064A \u0648\u0642\u062A \u0627\u0644\u0625\u0635\u062F\u0627\u0631 \u0648\u0630\u0644\u0643 \u064A\u0634\u0645\u0644 \u062D\u0644\u0648\u0644 \u062D\u0645\u0627\u064A\u0629 \u0627\u0644\u062D\u064A\u0627\u0629 \u0627\u0644\u0628\u0631\u064A\u0629\u060C \u062C\u0645\u0639\u064A\u0629 \u0639\u0644\u0645 \u0627\u0644\u062D\u064A\u0648\u0627\u0646 \u0641\u064A \u0641\u0631\u0627\u0646\u0643\u0641\u0648\u0631\u062A\u060C \u0627\u0644\u062D\u0641\u0627\u0638 \u0639\u0644\u0649 \u0627\u0644\u062D\u064A\u0627\u0629 \u0627\u0644\u0628\u0631\u064A\u0629 \u0627\u0644\u0639\u0627\u0644\u0645\u064A\u0629\u060C \u062D\u062F\u064A\u0642\u0629 \u062D\u064A\u0648\u0627\u0646 \u0646\u0648\u0631\u062B \u0643\u0627\u0631\u0648\u0644\u064A\u0646\u0627\u060C \u0628\u0627\u0646\u062B\u064A\u0631\u0627\u060C \u0645\u0624\u0633\u0633\u0629 \u062D\u062F\u0627\u0626\u0642 \u0627\u0644\u0633\u0644\u0627\u0645\u060C \u0635\u0646\u062F\u0648\u0642 \u0627\u0644\u062D\u064A\u0627\u0629 \u0627\u0644\u0628\u0631\u064A\u0629 \u0627\u0644\u0639\u0627\u0644\u0645\u064A \u0644\u062C\u0645\u0639\u064A\u0629 \u0627\u0644\u062D\u0641\u0627\u0638 \u0639\u0644\u0649 \u0627\u0644\u062D\u064A\u0627\u0629 \u0627\u0644\u0628\u0631\u064A\u0629\u060C \u062C\u0645\u0639\u064A\u0629 \u0639\u0644\u0645 \u0627\u0644\u062D\u064A\u0648\u0627\u0646 \u0641\u064A \u0644\u0646\u062F\u0646. \u062A\u0645 \u0637\u0631\u062D \u0646\u0638\u0627\u0645 SMART \u0648\u0625\u0635\u062F\u0627\u0631\u0647 \u0648\u0641\u0642\u064B\u0627 \u0644\u0645\u0628\u0627\u062F\u0626 \u0627\u0644\u0645\u062D\u0645\u064A\u0627\u062A \u0627\u0644\u0639\u0627\u0645\u0629 \u0645\u0646 \u0627\u0644\u0648\u0635\u0648\u0644 \u0627\u0644\u0645\u062A\u0627\u062D \u0644\u0644\u062C\u0645\u064A\u0639 \u0648\u0627\u0644\u0645\u0646\u0641\u0639\u0629 \u0627\u0644\u0645\u062A\u0639\u062F\u062F\u0629 \u0648\u0627\u0644\u062D\u0642\u0648\u0642 \u0648\u0627\u0644\u0645\u0633\u0624\u0648\u0644\u064A\u0627\u062A. SMART \u0645\u0635\u062F\u0631 \u0645\u0641\u062A\u0648\u062D \u0648\u063A\u064A\u0631 \u062E\u0627\u0636\u0639 \u0644\u0644\u0645\u0644\u0643\u064A\u0629 \u0648\u064A\u0645\u0643\u0646 \u0627\u0644\u062D\u0635\u0648\u0644 \u0639\u0644\u064A\u0647 \u0645\u062C\u0627\u0646\u0627. \u0644\u0645\u0632\u064A\u062F \u0645\u0646 \u0627\u0644\u0645\u0639\u0644\u0648\u0645\u0627\u062A \u060C \u064A\u0631\u062C\u0649 \u0632\u064A\u0627\u0631\u0629\: http\://www.smartconservationtool.org\n\n\u0627\u0644\u0635\u064A\u063A\u0629 \u0627\u0644\u0645\u0648\u0635\u064A \u0628\u0647\u0627\:\nSMART. \u0628\u0631\u0627\u0645\u062C \u0627\u0644\u0643\u0645\u0628\u064A\u0648\u062A\u0631. \u0623\u062F\u0627\u0629 \u0627\u0644\u0631\u0635\u062F \u0648\u0627\u0644\u0625\u0628\u0644\u0627\u063A \u0627\u0644\u0645\u0643\u0627\u0646\u064A. \u0627\u0644\u0625\u0635\u062F\u0627\u0631 {0}. <\u062A\u0627\u0631\u064A\u062E \u0627\u0644\u0648\u0635\u0648\u0644>. www.smartconservationtools.org
