1\u02c6\u00d0\u00b2\u00d0\u00b8\u00d0\u00b4\u00d0\u00ba\u00d0\u00be\u00d1\ufffd\u00d1\u201a\u00d1\u2013. \u00d0\u00a9\u00d0\u00be\u00d0\u00b1 \u00d1\u20ac\u00d0\u00be\u00d0\u00b7\u00d1\u20ac\u00d0\u00b0\u00d1\u2026\u00d1\u0192\u00d0\u00b2\u00d0\u00b0\u00d1\u201a\u00d0\u00b8 \u00d1\u2021\u00d0\u00b0\u00d1\ufffd\u00d1\u201a\u00d0\u00be\u00d1\u201a\u00d1\u0192 \u00d0\u00b7\u00d1\u0192\u00d1\ufffd\u00d1\u201a\u00d1\u20ac\u00d1\u2013\u00d1\u2021\u00d0\u00b5\u00d0\u00b9 (\u00d0\u00bd\u00d0\u00b0\u00d0\u00bf\u00d1\u20ac\u00d0\u00b8\u00d0\u00ba\u00d0\u00bb\u00d0\u00b0\u00d0\u00b4, \u00d0\u00b7\u00d0\u00b0 \u00d0\u00b2\u00d1\u2013\u00d0\u00b4\u00d1\ufffd\u00d1\u201a\u00d0\u00b0\u00d0\u00bd\u00d0\u00bd\u00d1\u017d) \u00d0\u00b7\u00d0\u00b0 \u00d0\u00bf\u00d0\u00b0\u00d1\u20ac\u00d0\u00b0\u00d0\u00bc\u00d0\u00b5\u00d1\u201a\u00d1\u20ac\u00d0\u00b0\u00d0\u00bc\u00d0\u00b8 \u00d0\u00b3\u00d1\u20ac\u00d1\u0192\u00d0\u00bf\u00d1\u0192\u00d0\u00b2\u00d0\u00b0\u00d0\u00bd\u00d0\u00bd\u00d1\ufffd, \u00d0\u00bf\u00d0\u00b5\u00d1\u20ac\u00d0\u00b5\u00d0\u00ba\u00d0\u00be\u00d0\u00bd\u00d0\u00b0\u00d0\u00b9\u00d1\u201a\u00d0\u00b5\u00d1\ufffd\u00d1\ufffd, \u00d1\u2030\u00d0\u00be \u00d1\u0192 \u00d1\ufffd\u00d0\u00bf\u00d0\u00b0\u00d0\u00b4\u00d0\u00bd\u00d0\u00be\u00d0\u00bc\u00d1\u0192 \u00d0\u00bc\u00d0\u00b5\u00d0\u00bd\u00d1\u017d \u00d0\u00b2\u00d0\u00b8\u00d0\u00b1\u00d1\u20ac\u00d0\u00b0\u00d0\u00bd\u00d0\u00be \u00d0\u2019\u00d1\u2013\u00d0\u00b4\u00d1\ufffd\u00d1\u201a\u00d0\u00b0\u00d0\u00bd\u00d1\u0152 (\u00d0\u00bd\u00d0\u00b5 \u00d0\u2014\u00d0\u00b0\u00d0\u00b3\u00d0\u00b0\u00d0\u00bb\u00d1\u0152\u00d0\u00bd\u00d0\u00b0 \u00d0\u00b2\u00d1\u2013\u00d0\u00b4\u00d1\ufffd\u00d1\u201a\u00d0\u00b0\u00d0\u00bd\u00d1\u0152). \u00d0\u2019\u00d0\u00b8\u00d0\u00b1\u00d1\u2013\u00d1\u20ac \u00d0\u00b7\u00d0\u00b0\u00d0\u00b3\u00d0\u00b0\u00d0\u00bb\u00d1\u0152\u00d0\u00bd\u00d0\u00be\u00d1\u2014 \u00d0\u00b2\u00d1\u2013\u00d0\u00b4\u00d1\ufffd\u00d1\u201a\u00d0\u00b0\u00d0\u00bd\u00d