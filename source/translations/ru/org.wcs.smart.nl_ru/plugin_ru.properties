about.command.label=\u041E \u043F\u0440\u043E\u0433\u0440\u0430\u043C\u043C\u0435 SMART
about.command.mnemonic=A
aboutText=\u0418\u043D\u0441\u0442\u0440\u0443\u043C\u0435\u043D\u0442 \u043F\u0440\u043E\u0441\u0442\u0440\u0430\u043D\u0441\u0442\u0432\u0435\u043D\u043D\u043E\u0433\u043E \u043C\u043E\u043D\u0438\u0442\u043E\u0440\u0438\u043D\u0433\u0430 \u0438 \u043E\u0442\u0447\u0435\u0442\u043D\u043E\u0441\u0442\u0438. \n\u0412\u0435\u0440\u0441\u0438\u044F {0} \u0410\u0432\u0442\u043E\u0440\u0441\u043A\u043E\u0435 \u043F\u0440\u0430\u0432\u043E (\u0421) 2012 \u041E\u0431\u0449\u0435\u0441\u0442\u0432\u043E \u0441\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u0438\u044F \u0434\u0438\u043A\u0438\u0445 \u0436\u0438\u0432\u043E\u0442\u043D\u044B\u0445. \n\u041F\u0440\u043E\u0433\u0440\u0430\u043C\u043C\u0430 SMART \u0431\u044B\u043B\u0430 \u0440\u0430\u0437\u0440\u0430\u0431\u043E\u0442\u0430\u043D\u0430 \u0432 \u0440\u0430\u043C\u043A\u0430\u0445 \u041F\u0430\u0440\u0442\u043D\u0435\u0440\u0441\u0442\u0432\u0430 SMART. \u041D\u0430 \u043C\u043E\u043C\u0435\u043D\u0442 \u0432\u044B\u043F\u0443\u0441\u043A\u0430 \u0432 \u041F\u0430\u0440\u0442\u043D\u0435\u0440\u0441\u0442\u0432\u043E \u0432\u0445\u043E\u0434\u0438\u043B\u0438 \u0424\u0440\u0430\u043D\u043A\u0444\u0443\u0440\u0442\u0441\u043A\u043E\u0435 \u0437\u043E\u043E\u043B\u043E\u0433\u0438\u0447\u0435\u0441\u043A\u043E\u0435 \u043E\u0431\u0449\u0435\u0441\u0442\u0432\u043E, \u0417\u043E\u043E\u043F\u0430\u0440\u043A \u0421\u0435\u0432\u0435\u0440\u043D\u043E\u0439 \u041A\u0430\u0440\u043E\u043B\u0438\u043D\u044B, \u041E\u0431\u0449\u0435\u0441\u0442\u0432\u043E \u0441\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u0438\u044F \u0434\u0438\u043A\u0438\u0445 \u0436\u0438\u0432\u043E\u0442\u043D\u044B\u0445, \u0412\u0441\u0435\u043C\u0438\u0440\u043D\u044B\u0439 \u0424\u043E\u043D\u0434 \u0434\u0438\u043A\u043E\u0439 \u043F\u0440\u0438\u0440\u043E\u0434\u044B, \u041B\u043E\u043D\u0434\u043E\u043D\u0441\u043A\u043E\u0435 \u0437\u043E\u043E\u043B\u043E\u0433\u0438\u0447\u0435\u0441\u043A\u043E\u0435 \u043E\u0431\u0449\u0435\u0441\u0442\u0432\u043E \u0438 \u0421\u0418\u0422\u0415\u0421-\u041F\u0440\u043E\u0433\u0440\u0430\u043C\u043C\u0430 \u043C\u043E\u043D\u0438\u0442\u043E\u0440\u0438\u043D\u0433\u0430 \u043D\u0435\u043B\u0435\u0433\u0430\u043B\u044C\u043D\u043E\u0439 \u0434\u043E\u0431\u044B\u0447\u0438 \u0441\u043B\u043E\u043D\u043E\u0432 (MIKE). \u041F\u0440\u043E\u0433\u0440\u0430\u043C\u043C\u0430 SMART \u0431\u044B\u043B\u0430 \u0440\u0430\u0437\u0440\u0430\u0431\u043E\u0442\u0430\u043D\u0430 \u0438 \u0432\u044B\u043F\u0443\u0449\u0435\u043D\u0430 \u0432 \u0441\u043E\u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0438\u0438 \u0441 \u043F\u0440\u0438\u043D\u0446\u0438\u043F\u0430\u043C\u0438 \u041F\u0440\u0438\u0440\u043E\u0434\u043E\u043E\u0445\u0440\u0430\u043D\u043D\u044B\u0445 \u0441\u043E\u043E\u0431\u0449\u0435\u0441\u0442\u0432 \u2013 \u043E\u0442\u043A\u0440\u044B\u0442\u044B\u0439 \u0434\u043E\u0441\u0442\u0443\u043F, \u0432\u0437\u0430\u0438\u043C\u043D\u0430\u044F \u043F\u043E\u043B\u044C\u0437\u0430, \u043F\u0440\u0430\u0432\u0430 \u0438 \u043E\u0431\u044F\u0437\u0430\u0442\u0435\u043B\u044C\u0441\u0442\u0432\u0430. \u041F\u0440\u043E\u0433\u0440\u0430\u043C\u043C\u0430 SMART- \u043E\u0431\u0449\u0435\u0434\u043E\u0441\u0442\u0443\u043F\u043D\u0430\u044F, \u043D\u0435\u0437\u0430\u043F\u0430\u0442\u0435\u043D\u0442\u043E\u0432\u0430\u043D\u043D\u0430\u044F \u0438 \u0431\u0435\u0441\u043F\u043B\u0430\u0442\u043D\u0430\u044F. \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0431\u043E\u043B\u0435\u0435 \u043F\u043E\u0434\u0440\u043E\u0431\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438 \u0437\u0430\u0439\u0434\u0438\u0442\u0435 \u043D\u0430 \u0441\u0430\u0439\u0442 http\://www.smartconservationsoftware.org\n\n\n 
