aboutText=Herramienta de Monitoreo y An\u00E1lisis Espacial\n \nVersi\u00F3n\: {0}\n \nCopyright (C) 2012 Wildlife Conservation Society\n\nSMART ha sido desarrollado a trav\u00E9s del consorcio SMART. En el momento de la liberaci\u00F3n este\nincluye Sociedad Zool\u00F3gica de Frankfurt, Zool\u00F3gico de Carolina del Norte, WCS (Wildlife\nConservation Society), WWF (World Wildlife Fund), la Sociedad Zool\u00F3gica de Londres y\nCITES-Monitoreo de la matanza ilegal de elefantes (MIKE).\n\nSMART ha sido desarrollado y publicado de conformidad con los principios de \u201CConservation Commons\u201D \nde acceso abierto, beneficio mutuo, y  derechos y responsabilidades. SMART es de c\u00F3digo abierto, \nsin propietario y libre de obtener. \nPara obtener m\u00E1s informaci\u00F3n, visite\: http\://www.smartconservationtools.org\n
