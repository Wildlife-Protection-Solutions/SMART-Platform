aboutText=Spatiale outil de suivi et de rapports\n\nVersion :. {0}  n  nCopyright (C) 2012 Wildlife Conservation Society\n\nSMART a \u00e9t\u00e9 d\u00e9velopp\u00e9 par le Partenariat SMART. Au moment de la publication d'un  nincludes Soci\u00e9t\u00e9 zoologique de Francfort, North Carolina Zoological Park, Wildlife\nConservation Society, World Wildlife Fund, Soci\u00e9t\u00e9 zoologique de Londres, et  nCITES-suivi de l'abattage illicite des \u00e9l\u00e9phants (MIKE).\n\nSMART a \u00e9t\u00e9 \u00e9labor\u00e9 et publi\u00e9 conform\u00e9ment \u00e0 la Conservation Commons  nprinciples d'acc\u00e8s ouvert, d'int\u00e9r\u00eat mutuel et les droits et responsabilit\u00e9s. SMART est open source,\nnon-exclusive et gratuite \u00e0 obtenir. Pour plus d'informations, visitez le site:\nhttp://www.smartconservationsoftware.org\n
